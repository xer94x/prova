<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTTstream — Digitale Terrestre Italia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');
:root{
  --bg:#08080e;--surface:#0f0f1a;--card:#141420;--card2:#1a1a2a;
  --border:#1e1e30;--border2:#2a2a40;
  --green:#00c853;--green2:#69f0ae;--gdim:rgba(0,200,83,.1);
  --red:#ff1744;--blue:#2979ff;--gold:#ffd740;
  --text:#e2e2ee;--muted:#44445a;--muted2:#6a6a85;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.logo-a{color:var(--green)}.logo-b{color:var(--text)}
#ch-count{font-size:11px;color:var(--muted2)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted2);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 9px}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.pill.ok .dot{background:var(--green);box-shadow:0 0 4px var(--green)}
.pill.err .dot{background:var(--red)}
.pill.loading .dot{background:var(--green2);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
#search{flex:1;max-width:320px;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--green)}
#search::placeholder{color:var(--muted2)}
.btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--muted2);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn:disabled{opacity:.3;cursor:default}

.tabs-wrap{position:relative;background:var(--surface);border-bottom:1px solid var(--border);min-height:36px}
.tabs-arrow{position:absolute;top:0;bottom:0;width:32px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--surface) 60%,transparent);border:none;color:var(--muted2);font-size:14px;cursor:pointer;z-index:2;transition:color .15s}
.tabs-arrow:hover{color:var(--green)}
.tabs-arrow.left{left:0}
.tabs-arrow.right{right:0;background:linear-gradient(270deg,var(--surface) 60%,transparent)}
.tabs-arrow.hidden{opacity:0;pointer-events:none}
.group-tabs{padding:0 36px;display:flex;gap:0;overflow-x:auto;scroll-behavior:smooth;min-height:36px;align-items:center}
.group-tabs::-webkit-scrollbar{height:0}
.gtab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.gtab:hover{color:var(--text)}
.gtab.active{color:var(--green);border-bottom-color:var(--green)}

.cats-wrap{position:relative;background:var(--card);border-bottom:1px solid var(--border);min-height:32px}
.cats-arrow{position:absolute;top:0;bottom:0;width:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--card) 60%,transparent);border:none;color:var(--muted2);font-size:12px;cursor:pointer;z-index:2;transition:color .15s}
.cats-arrow:hover{color:var(--green)}
.cats-arrow.left{left:0}
.cats-arrow.right{right:0;background:linear-gradient(270deg,var(--card) 60%,transparent)}
.cats-arrow.hidden{opacity:0;pointer-events:none}
.cat-strip{padding:5px 32px;display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;min-height:32px;align-items:center}
.cat-strip::-webkit-scrollbar{height:0}
.cat-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 9px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn:hover,.cat-btn.active{background:var(--gdim);border-color:rgba(0,200,83,.4);color:var(--green)}

.content{padding:14px 18px 60px}

/* FLAT GRID */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}

/* ── CARD ── */
.ch-card{
  position:relative;background:var(--card);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:background .18s,border-color .18s,transform .15s,box-shadow .18s;
}
.ch-card:hover{background:var(--card2);border-color:rgba(0,200,83,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}

.ch-logo-wrap{
  height:82px;display:flex;align-items:center;justify-content:center;
  padding:12px;background:#1a1a2e;position:relative;overflow:hidden;flex-shrink:0;
}
.ch-logo-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}

/* multi-source badge top-right */
.ch-src{position:absolute;top:6px;right:7px;font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.3px;padding:1px 4px;border-radius:3px;z-index:3;line-height:1.6}
.src-both{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:var(--green)}
.src-free{background:rgba(41,121,255,.12);border:1px solid rgba(41,121,255,.3);color:#82b1ff}
.src-brand{background:rgba(255,215,64,.1);border:1px solid rgba(255,215,64,.3);color:var(--gold);font-size:7px;letter-spacing:.5px}

.ch-logo{max-width:100%;max-height:52px;object-fit:contain;display:block;position:relative;z-index:1;transition:transform .3s}
.ch-card:hover .ch-logo{transform:scale(1.06)}
.ch-logo-ph{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#1c1c30,#2a1c30);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--muted2)}

/* info + inline links */
.ch-info{padding:8px 8px 10px;display:flex;flex-direction:column;gap:6px;flex:1}
.ch-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* INLINE STREAM BUTTONS */
.ch-links{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.lnk-btn{
  flex:1;min-width:0;
  display:flex;align-items:center;justify-content:center;gap:3px;
  background:var(--gdim);border:1px solid rgba(0,200,83,.25);border-radius:5px;
  padding:4px 6px;color:var(--green);font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;transition:background .15s,border-color .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-decoration:none;
}
.lnk-btn:hover{background:rgba(0,200,83,.2);border-color:rgba(0,200,83,.5)}
/* variant colors for alt sources */
.lnk-btn.alt{background:rgba(41,121,255,.1);border-color:rgba(41,121,255,.3);color:#82b1ff}
.lnk-btn.alt:hover{background:rgba(41,121,255,.2)}

.skeleton{border-radius:10px;min-height:148px;background:linear-gradient(90deg,var(--card) 25%,#181828 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

#empty{display:none;padding:60px;text-align:center;color:var(--muted2);font-size:13px}
#empty.show{display:block}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-a">DTT</span><span class="logo-b">stream</span> 🇮🇹</div>
  <span id="ch-count">Caricamento...</span>
  <div class="hdr-r">
    <div class="pill loading" id="spill"><div class="dot"></div><span id="stxt">Carico...</span></div>
  </div>
</header>

<div class="top-bar">
  <input id="search" type="text" placeholder="🔍  Cerca canale..." oninput="render()">
  <button class="btn" id="rbtn" onclick="init(true)" disabled>↺ Ricarica</button>
</div>

<div class="tabs-wrap">
  <button class="tabs-arrow left hidden" id="tabs-left" onclick="scrollTabs(-1)">&#8249;</button>
  <div class="group-tabs" id="gtabs"><button class="gtab active">Tutti</button></div>
  <button class="tabs-arrow right hidden" id="tabs-right" onclick="scrollTabs(1)">&#8250;</button>
</div>

<div class="cats-wrap">
  <button class="cats-arrow left hidden" id="cats-left" onclick="scrollCats(-1)">&#8249;</button>
  <div class="cat-strip" id="cstrip"><button class="cat-btn active">Tutte</button></div>
  <button class="cats-arrow right hidden" id="cats-right" onclick="scrollCats(1)">&#8250;</button>
</div>

<div class="content" id="content"><div class="ch-grid" id="skel"></div></div>
<div id="empty">Nessun canale trovato</div>

<script>
// -- Scroll arrows -------------------------------------------------------------
function updateArrows(el,lBtn,rBtn){
  lBtn.classList.toggle("hidden",el.scrollLeft<=4);
  rBtn.classList.toggle("hidden",el.scrollLeft>=el.scrollWidth-el.clientWidth-4);
}
function scrollTabs(d){document.getElementById("gtabs").scrollBy({left:d*200,behavior:"smooth"})}
function scrollCats(d){document.getElementById("cstrip").scrollBy({left:d*200,behavior:"smooth"})}
function initScrollArrows(){
  const tabs=document.getElementById("gtabs"),cats=document.getElementById("cstrip");
  const tl=document.getElementById("tabs-left"),tr=document.getElementById("tabs-right");
  const cl=document.getElementById("cats-left"),cr=document.getElementById("cats-right");
  tabs.addEventListener("scroll",()=>updateArrows(tabs,tl,tr));
  cats.addEventListener("scroll",()=>updateArrows(cats,cl,cr));
  setTimeout(()=>{updateArrows(tabs,tl,tr);updateArrows(cats,cl,cr)},100);
}

// Sottogruppi Rakuten nell'ordine desiderato per il cat-strip
const RAKUTEN_SUBCAT_ORDER=["Film","Serie","Crime","Comedy","Documentari","Sport","Kids","Musica","Lifestyle","News"];

// -- LG Channels: mappa numero canale -> sottogruppo ---------------------------
const LG_SUBCAT_ORDER=["Cinema","Serie & Fiction","Comedy","Crime","Intrattenimento","Food & Lifestyle","Natura & Doc","Sport","Rakuten Viki","Kids & Anime","Musica","News"];
const STREAMING_SUBCAT_ORDER=['Novità','Cinema','Serie','Sport','Kids','Musica','Natura & Doc','Food & Lifestyle','News','Comedy','Intrattenimento','Horror','Western','Romance','Rakuten Viki'];

function getLgSubcat(num){
  if(!num) return "Cinema";
  if((num>=100&&num<=253)||num===999) return "Cinema";
  if(num>=305&&num<=484) return "Serie & Fiction";
  if(num>=489&&num<=491) return "Comedy";
  if(num>=511&&num<=517) return "Crime";
  if(num>=534&&num<=565) return "Intrattenimento";
  if(num>=610&&num<=637) return "Food & Lifestyle";
  if(num>=642&&num<=679) return "Natura & Doc";
  if(num>=700&&num<=747) return "Sport";
  if(num>=801&&num<=814) return "Rakuten Viki";
  if(num>=844&&num<=941) return "Kids & Anime";
  if(num>=955&&num<=981) return "Musica";
  if(num>=985&&num<=998) return "News";
  return "Cinema";
}

// -- Normalizza i sottogruppi streaming in categorie unificate ----------------
function normalizeStreamingSubcat(sg){
  if(!sg) return "Cinema";
  const s=sg.toLowerCase().trim();
  if(/serie|fiction|classich/.test(s)) return "Serie";
  if(/natura|doc/.test(s)) return "Natura & Doc";
  if(/news|mondo/.test(s)) return "News";
  if(/kids|anime|animaz|bambini|teen/.test(s)) return "Kids";
  if(/sport|motori/.test(s)) return "Sport";
  if(/cinema|film/.test(s)) return "Cinema";
  if(/food|lifestyle/.test(s)) return "Food & Lifestyle";
  if(/musica|music/.test(s)) return "Musica";
  if(/comedy|commedia/.test(s)) return "Comedy";
  if(/intrattenimento/.test(s)) return "Intrattenimento";
  if(/rakuten viki|viki/.test(s)) return "Rakuten Viki";
  if(/horror|paranormal/.test(s)) return "Horror";
  if(/western/.test(s)) return "Western";
  if(/romanc|romance/.test(s)) return "Romance";
  if(/donne|protagoniste/.test(s)) return "Cinema";
  if(/notti/.test(s)) return "Cinema";
  if(/novit/.test(s)) return "Novità";
  if(/true crime/.test(s)) return "Intrattenimento";
  if(/crime|sci.fi/.test(s)) return "Cinema";
  return sg;
}

function freetvGroupFromUrl(name,url,rawGroup){
  const n=name.toLowerCase(),u=(url||"").toLowerCase();
  if(u.includes("stvp-")||u.includes("samsungcloud")||u.includes("samsung.wurl"))return "Streaming";
  if(u.includes("rakuten")||n.startsWith("rakuten tv"))return "Streaming";
  if(u.includes("mjh.nz/lg")||u.includes("lgchannels")||u.includes("lg.com/channels"))return "Streaming";
  if(/\brain\b|rai\s*\d|rai\s*(news|sport|movie|storia|scuola|gulp|yoyo|premium)/.test(n))return "RAI";
  if(/canale\s*5|italia\s*1|rete\s*4|cine\s*34|\biris\b|la\s*5|top crime|tgcom|20 mediaset|27 twenty/.test(n))return "Mediaset";
  if(/\bsport\b|calcio|tennis|motor|football|supertennis|sportitalia/.test(n))return "Sport";
  if(/\bnews\b|tg\s*\d|tg24|notizie|giornale|euronews/.test(n))return "News";
  if(/yoyo|gulp|boing|cartoon|junior|\bkids\b|super!|cartoonito/.test(n))return "Kids";
  if(/music|\bradio\b|rtl|deejay|m2o|vevo|trace|virgin|\bmtv\b/.test(n))return "Musica";
  if(/padre pio|maria|vangelo|cristian|chiesa|vatica|cenacolo|pace tv|tv2000/.test(n))return "Religiosi";
  if(/\bfilm\b|\bmovie\b|cinema/.test(n))return "Cinema";
  return "Nazionali";
}

function getSamsungSubcat(rawGroup){
  const m={"Film":"Cinema","Serie TV":"Serie & Fiction","Documentari":"Natura & Doc",
    "Sport":"Sport","Calcio":"Sport","News":"News","Musica":"Musica",
    "Bambini":"Kids / Anime","Crime":"Crime","Intrattenimento":"Food & Lifestyle",
    "Cucina & Viaggi":"Food & Lifestyle"};
  return m[rawGroup]||"Cinema";
}

function getStreamingSubcatFromUrl(name,url,rawGroup,group){
  if(group==="Samsung"&&rawGroup)return getSamsungSubcat(rawGroup);
  if(group==="Pluto"&&rawGroup)return rawGroup;
  if(group==="Rakuten"&&rawGroup)return rawGroup;
  const n=name.toLowerCase();
  if(/action|avventura|film d.az/.test(n))return "Film d'azione";
  if(/commedia|comedy/.test(n))return "Commedia";
  if(/dramma|drama/.test(n))return "Dramma";
  if(/thriller|brivid|suspense/.test(n))return "Thriller";
  if(/horror|paura/.test(n))return "Horror";
  if(/fantascienza|sci.fi/.test(n))return "Fantascienza";
  if(/bambini|kids|cartoni|animaz/.test(n))return "Bambini";
  if(/romanc|amore/.test(n))return "Romantico";
  if(/family|famiglia/.test(n))return "Family";
  if(/\bdoc|nature|natur|discovery|animal/.test(n))return "Documentari";
  if(/\bnews\b|notizie/.test(n))return "News";
  if(/\bsport\b|calcio|football/.test(n))return "Sport";
  if(/music|musica/.test(n))return "Musica";
  if(/serie|fiction|show/.test(n))return "Serie";
  if(/crime|poliziesc/.test(n))return "Crime";
  if(/cucina|food|lifestyle|viaggio/.test(n))return "Food & Lifestyle";
  if(/asiatici/.test(n))return "Film Asiatici";
  if(/western/.test(n))return "Western";
  return "Film";
}

// -- Group sort order ----------------------------------------------------------
const GROUP_ORDER=["RAI","Mediaset","Nazionali","Sport","News","Kids","Musica","Religiosi","Cinema","Streaming","Regioni","Altro"];

function groupLabel(g){return (GROUP_EMOJI[g]||"")+" "+g}

// -- Normalize channel name for dedup key -------------------------------------
function normKey(name){
  return name.toLowerCase()
    .replace(/\s*\(link\s*\d+\)/gi,"").replace(/\s*\(stream\s*\w*\)/gi,"")
    .replace(/\s*\(stream\s*mdp\)/gi,"").replace(/[''`]/g,"'")
    .replace(/\s+/g," ").replace(/[^\w\s]/g,"").trim();
}
function cleanName(name){
  return name.replace(/\s*\(link\s*\d+\)/gi,"").replace(/\s*\(stream\s*\w*\)/gi,"")
    .replace(/\s*\(stream\s*mdp\)/gi,"").replace(/[''`]/g,"'").trim();
}

// Normalizza stringa per confronto alias
function _normAlias(s){
  return s.toLowerCase()
    .replace(/[|\u00b7\u2022\u2013\u2014]/g," ")
    .replace(/[\u2018\u2019`]/g,"")
    .replace(/[^\w\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
}
const _IGNORE_SUFFIXES=[
  " channel"," hd"," tv"," fast"," fast+"," international",
  " samsung ch"," samsung channels"," samsung chan",
  " rakuten tv"," rakuten",
  " english"," espaniol"," italiano",
  " live"," now"," plus"," 60"," animated",
  " by stingray"," stingray",
  " ita"," italy",
  " in diretta"," diretta",
  " collection",
];
function _stripSuf(s){
  let r=s,changed=true;
  while(changed){
    changed=false;
    for(const sf of _IGNORE_SUFFIXES){
      if(r.endsWith(sf)){r=r.slice(0,r.length-sf.length).trim();changed=true;}
    }
  }
  return r;
}
function resolveAlias(name){
  const k=_normAlias(name);
  if(CHANNEL_ALIAS[k]) return CHANNEL_ALIAS[k];
  const ks=_stripSuf(k);
  if(CHANNEL_ALIAS[ks]) return CHANNEL_ALIAS[ks];
  for(const [alias,canonical] of Object.entries(CHANNEL_ALIAS)){
    const a=_normAlias(alias),as=_stripSuf(a);
    if(k===a||k===as||ks===a||ks===as) return canonical;
    if(k.startsWith(a+" ")||k.startsWith(as+" ")) return canonical;
    if(a.startsWith(k+" ")||as.startsWith(ks+" ")) return canonical;
  }
  return null;
}

function applySubgroupOverride(name, subgroup) {
  if(!name) return subgroup;
  // Normalize: lowercase, remove punctuation/special chars, collapse spaces
  const k = name.toLowerCase()
    .replace(/[|\u00b7\u2022\u2013\u2014]/g," ")
    .replace(/[\u2018\u2019`'']/g,"")
    .replace(/[^\w\s]/g," ")
    .replace(/\s+/g," ")
    .trim();
  if (CHANNEL_SUBGROUP_OVERRIDE[k] !== undefined) return CHANNEL_SUBGROUP_OVERRIDE[k];
  // Rakuten Viki channels -> Serie
  if (subgroup === "Rakuten Viki") return "Serie";
  return subgroup;
}

function extractLgNum(name){
  const m=name.match(/^(\d+)\s+/);
  return m?parseInt(m[1]):null;
}

// -- Rimuove prefisso numerico dal nome LG (es. "205 Sony One" -> "Sony One") --
function stripLgNum(name){
  return name.replace(/^\d+\s+/,"").trim();
}

// -- Parse M3U -----------------------------------------------------------------
function parseM3U(text){
  const lines=text.split(/\r?\n/);
  const raw=[];let cur=null;let _pos=0;
  for(const line of lines){
    const l=line.trim();
    if(l.startsWith("#EXTINF")){
      cur={};
      const nm=l.match(/,(.+)$/);if(nm)cur.name=nm[1].trim();
      const lm=l.match(/tvg-logo="([^"]+)"/);if(lm)cur.logo=lm[1];
      const gm=l.match(/group-title="([^"]+)"/);if(gm)cur.group=gm[1];
      const cn=l.match(/tvg-chno="([^"]+)"/);if(cn)cur.chno=parseInt(cn[1])||null;
      cur._pos=++_pos;
    }else if((l.startsWith("http")||l.startsWith("rtmp")||l.startsWith("rtp"))&&cur){
      cur.url=l;raw.push(cur);cur=null;
    }
  }
  return raw;
}

// -- Build merged channel list -------------------------------------------------
function buildChannels(rawDTT, rawFree, rawRakuten, rawPluto){
  const map={};

  // 1. Process tivustream (primary → highest priority)
  for(const r of rawDTT){
    if(!r.url||!r.name)continue;
    if(r.url.includes("startend.avi"))continue;
    if(r.name.startsWith("===")||r.name.startsWith("---"))continue;
    const gl=GMAP[r.group]||"Altro";

    let displayName=cleanName(r.name);
    let sg=null;
    const isLG=(r.group==="LG Channels");
    const isRakuten=(r.group==="Rakuten Tv");
    const isSamsung=(r.group==="Samsung Channels");
    const isWedo=(r.group==="Wedo Tv");
    if(gl==="Streaming"){
      if(isLG){
        const lgNum=extractLgNum(r.name);
        sg=normalizeStreamingSubcat(getLgSubcat(lgNum));
        displayName=stripLgNum(displayName);
      }else if(isRakuten||isSamsung||isWedo){
        sg=normalizeStreamingSubcat(getStreamingSubcatFromUrl(cleanName(r.name),r.url||"",r.group||"",r.group==="Samsung Channels"?"Samsung":"Rakuten"));
      }else{
        sg=normalizeStreamingSubcat(getStreamingSubcatFromUrl(cleanName(r.name),r.url||"",r.group||"","Streaming"));
      }
    }else{
      sg=REGIONE_RAW[r.group||""]||(gl!=="Streaming"?null:null);
    }

    // Applica alias
    if(gl==="Streaming"){
      const a1=resolveAlias(displayName);
      if(a1) displayName=a1;
      else{
        const stripped=_stripSuf(_normAlias(displayName));
        const a2=resolveAlias(stripped);
        if(a2) displayName=a2;
      }
    }
    const key=normKey(displayName);
    if(!map[key]){
      const brand=isLG?"LG":isSamsung?"Samsung":isRakuten?"Rakuten":isWedo?"Wedo":null;
      map[key]={name:displayName,logo:r.logo||null,group:gl,subgroup:sg||null,brand:brand,dttNum:null,streams:[],seenUrls:new Set()};
    }
    const ch=map[key];
    if(r.logo&&!ch.logo)ch.logo=r.logo;
    if(gl==="Streaming"&&sg){
      ch.subgroup=normalizeStreamingSubcat(sg);
      // Apply manual subgroup override
      ch.subgroup=applySubgroupOverride(ch.name,ch.subgroup);
    }
    if(!ch.seenUrls.has(r.url)){
      ch.seenUrls.add(r.url);
      ch.streams.push({url:r.url,label:null,source:isSamsung?"samsung":isLG?"lg":isRakuten?"rakuten":isWedo?"wedo":"dtt"});
    }
  }

  // 2. Process Rakuten dedicated playlist
  for(const r of rawRakuten){
    if(!r.url||!r.name)continue;
    if(r.url.includes("youtube.com")||r.url.includes("twitch.tv"))continue;
    let cname=r.name.trim();
    const rakAlias=resolveAlias(cname);
    if(rakAlias) cname=rakAlias;
    else{const rs=_stripSuf(_normAlias(cname));const ra2=resolveAlias(rs);if(ra2)cname=ra2;}
    const key=normKey(cname);
    const rakSubgroup=normalizeStreamingSubcat(r.group||"Film");

    if(!map[key]){
      map[key]={name:cname,logo:r.logo||null,group:"Streaming",subgroup:rakSubgroup,brand:"Rakuten",_prio:5,dttNum:null,streams:[],seenUrls:new Set()};
    }
    const ch=map[key];
    if(r.logo)ch.logo=r.logo;
    ch.group="Streaming";
    ch.subgroup=applySubgroupOverride(cname,rakSubgroup);
    if(!ch.seenUrls.has(r.url)){
      ch.seenUrls.add(r.url);
      ch.streams.push({url:r.url,label:null,source:"rakuten"});
    }
  }

  // 2b. Process Pluto TV
  for(const r of (rawPluto||[])){
    if(!r.url||!r.name)continue;
    let cname=r.name.trim();
    const pluAlias=resolveAlias(cname);
    if(pluAlias) cname=pluAlias;
    else{const ps=_stripSuf(_normAlias(cname));const pa2=resolveAlias(ps);if(pa2)cname=pa2;}
    const key=normKey(cname);
    const plutoSubgroup=normalizeStreamingSubcat(r.group||"Film");

    if(!map[key]){
      map[key]={name:cname,logo:r.logo||null,group:"Streaming",subgroup:plutoSubgroup,brand:"Pluto",_prio:2,dttNum:null,streams:[],seenUrls:new Set()};
    }
    const ch=map[key];
    if(r.logo&&!ch.logo)ch.logo=r.logo;
    ch.group="Streaming";
    ch.subgroup=applySubgroupOverride(cname,plutoSubgroup);
    if(!ch.seenUrls.has(r.url)){
      ch.seenUrls.add(r.url);
      ch.streams.push({url:r.url,label:null,source:"pluto"});
    }
  }

  // 3. Process Free-TV Italy + Samsung
  for(const r of rawFree){
    if(!r.url||!r.name)continue;
    if(r.url.includes("youtube.com")||r.url.includes("twitch.tv"))continue;

    let cname=r.name.replace(/\s*[ⓢⓣⓨⓖ⊕]/gu,"").trim();
    const gl=freetvGroupFromUrl(cname,r.url||"",r.group||"");
    if(gl==="Streaming"){const fa=resolveAlias(cname);if(fa)cname=fa;else{const fs=_stripSuf(_normAlias(cname));const fa2=resolveAlias(fs);if(fa2)cname=fa2;}}
    const key=normKey(cname);

    if(!map[key]){
      const sg=gl==="Streaming"?applySubgroupOverride(cname,normalizeStreamingSubcat(getStreamingSubcatFromUrl(cname,r.url||"",r.group||"",gl))):null;
      map[key]={name:cname,logo:r.logo||null,group:gl,subgroup:sg||null,_prio:gl==="Streaming"?4:null,dttNum:null,streams:[],seenUrls:new Set()};
    }
    const ch=map[key];
    if(gl==="Streaming"){
      if(!ch._prio||4<ch._prio){ch._prio=4;ch.name=cname;if(r.logo)ch.logo=r.logo;}
      else if(r.logo&&!ch.logo)ch.logo=r.logo;
    }else{if(r.logo&&!ch.logo)ch.logo=r.logo;}
    if(gl==="Streaming"){
      if(ch.group!=="Streaming"){
        ch.group=gl;
        const sg=applySubgroupOverride(cname,normalizeStreamingSubcat(getStreamingSubcatFromUrl(cname,r.url||"",r.group||"",gl)));
        if(sg)ch.subgroup=sg;
      }
    }
    if(!ch.seenUrls.has(r.url)){
      ch.seenUrls.add(r.url);
      ch.streams.push({url:r.url,label:null,source:"free"});
    }
  }

  // Label streams → ordina per priorità sorgente
  const SRC_PRIO={samsung:1,pluto:2,dtt:3,lg:3,wedo:4,free:4,rakuten:5};
  const LG_FIRST_CHANNELS=["euronews"];
  const RAKUTEN_FIRST_CHANNELS=["that's 70s","that's 80s","that's 90s00s","that's rock"];
  for(const ch of Object.values(map)){
    if(ch.group==="Streaming"){
      const isSony=ch.name.toLowerCase().includes("sony one");
      const chk=ch.name.toLowerCase();
      const isLgFirst=LG_FIRST_CHANNELS.includes(chk);
      const isRakutenFirst=RAKUTEN_FIRST_CHANNELS.includes(chk);
      ch.streams.sort((a,b)=>{
        let pa=SRC_PRIO[a.source]||9;
        let pb=SRC_PRIO[b.source]||9;
        if(isSony){if(a.source==="dtt"||a.source==="lg")pa=0;if(b.source==="dtt"||b.source==="lg")pb=0;}
        if(isLgFirst){if(a.source==="lg")pa=0;if(b.source==="lg")pb=0;}
        if(isRakutenFirst){if(a.source==="rakuten")pa=0;if(b.source==="rakuten")pb=0;}
        return pa-pb;
      });
    }
    const total=ch.streams.length;
    ch.streams.forEach((s,i)=>{
      s.label=total===1?"▶ Guarda":`${i+1}`;
      s.isAlt=(s.source==="free"||s.source==="rakuten");
    });
    delete ch.seenUrls;
    delete ch._prio;
  }

  const arr=Object.values(map).filter(ch=>ch.streams.length>0);
  return arr;
}

// -- Group sort order ----------------------------------------------------------
function groupSortIdx(g){
  const i=GROUP_ORDER.indexOf(g);
  return i>=0?i:GROUP_ORDER.length;
}

function sortChannels(arr){
  return [...arr].sort((a,b)=>{
    const ag=groupSortIdx(a.group), bg=groupSortIdx(b.group);
    return ag-bg||a.name.localeCompare(b.name,"it");
  });
}

// -- State ---------------------------------------------------------------------
let ALL=[];
let activeGroup="Tutti";
let activeCat="Tutte";

// -- Tabs ----------------------------------------------------------------------
function getGroups(){
  const present=new Set(ALL.map(c=>c.group));
  const base=["Tutti",...GROUP_ORDER.filter(g=>present.has(g))];
  return base;
}

function setStatus(state,txt){
  document.getElementById("spill").className="pill "+state;
  document.getElementById("stxt").textContent=txt;
}

function renderTabs(){
  const el=document.getElementById("gtabs");el.innerHTML="";
  for(const g of getGroups()){
    const b=document.createElement("button");
    b.className="gtab"+(g===activeGroup?" active":"");
    b.textContent=g==="Tutti"?"Tutti":groupLabel(g);
    b.onclick=()=>{activeGroup=g;activeCat="Tutte";renderTabs();renderCats();render()};
    el.appendChild(b);
  }
  setTimeout(()=>updateArrows(document.getElementById("gtabs"),document.getElementById("tabs-left"),document.getElementById("tabs-right")),50);
}

// -- Cat strip -----------------------------------------------------------------
function renderCats(){
  const el=document.getElementById("cstrip");el.innerHTML="";
  const vis=activeGroup==="Tutti"?ALL:ALL.filter(c=>c.group===activeGroup);
  let cats=["Tutte"];
  if(activeGroup==="Regioni"){
    const present=new Set(vis.map(c=>c.subgroup).filter(Boolean));
    cats=[...cats,...ALL_REGIONI.filter(r=>present.has(r))];
  }else if(activeGroup==="Streaming"){
    const present=new Set(vis.map(c=>c.subgroup).filter(Boolean));
    cats=[...cats,...STREAMING_SUBCAT_ORDER.filter(s=>present.has(s))];
    [...present].filter(s=>!STREAMING_SUBCAT_ORDER.includes(s)).sort().forEach(s=>cats.push(s));
  }else if(activeGroup==="Tutti"){
    const present=new Set(vis.map(c=>c.group));
    GROUP_ORDER.filter(g=>present.has(g)).forEach(g=>cats.push(g));
  }
  for(const c of cats){
    const b=document.createElement("button");
    b.className="cat-btn"+(c===activeCat?" active":"");
    b.textContent=c;
    b.onclick=()=>{activeCat=c;renderCats();render()};
    el.appendChild(b);
  }
  setTimeout(()=>updateArrows(document.getElementById("cstrip"),document.getElementById("cats-left"),document.getElementById("cats-right")),50);
}

// -- Render --------------------------------------------------------------------
function render(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  let vis=ALL;
  if(activeGroup!=="Tutti")vis=vis.filter(c=>c.group===activeGroup);
  if(activeCat!=="Tutte"){
    if(activeGroup==="Regioni"||activeGroup==="Streaming")vis=vis.filter(c=>c.subgroup===activeCat);
    else if(activeGroup==="Tutti")vis=vis.filter(c=>c.group===activeCat);
  }
  if(q)vis=vis.filter(c=>c.name.toLowerCase().includes(q));

  vis=sortChannels(vis);

  const content=document.getElementById("content");
  const empty=document.getElementById("empty");
  document.getElementById("ch-count").textContent=vis.length===ALL.length?`${ALL.length} canali`:`${vis.length} / ${ALL.length}`;

  if(vis.length===0){content.innerHTML="";empty.classList.add("show");return}
  empty.classList.remove("show");

  const grid=document.createElement("div");
  grid.className="ch-grid";
  for(const ch of vis)grid.appendChild(makeCard(ch));
  content.innerHTML="";
  content.appendChild(grid);
}

function makeCard(ch){
  const ini=ch.name.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"TV";

  const multi=ch.streams.length>1;

  const card=document.createElement("div");
  card.className="ch-card";

  let srcBadge="";
  if(ch.group==="Streaming"&&ch.brand){
    srcBadge=`<span class="ch-src src-brand">${ch.brand}</span>`;
  }else if(multi){
    const hasFree=ch.streams.some(s=>s.source==="free");
    const hasDtt=ch.streams.some(s=>s.source==="dtt");
    if(hasFree&&hasDtt)srcBadge=`<span class="ch-src src-both">${ch.streams.length} LINK</span>`;
    else if(hasFree)srcBadge=`<span class="ch-src src-free">${ch.streams.length} LINK</span>`;
    else srcBadge=`<span class="ch-src src-both">${ch.streams.length} LINK</span>`;
  }

  const logoHtml=ch.logo
    ?`<img class="ch-logo" src="${ch.logo}" alt="" loading="lazy" onerror="this.outerHTML='<div class=ch-logo-ph>${ini}</div>'">`
    :`<div class="ch-logo-ph">${ini}</div>`;

  let linksHtml="";
  if(ch.streams.length===1){
    const s=ch.streams[0];
    const alt=(s.source==="free")?" alt":"";
    linksHtml=`<a class="lnk-btn${alt}" href="${s.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Guarda</a>`;
  }else{
    linksHtml=ch.streams.map((s,i)=>{
      const alt=(s.source==="free")?" alt":"";
      return `<a class="lnk-btn${alt}" href="${s.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${i+1}</a>`;
    }).join("");
  }

  const primaryUrl=ch.streams[0]?.url||"#";
  card.style.cursor="pointer";
  card.innerHTML=`
    <div class="ch-logo-wrap">
      ${srcBadge}
      ${logoHtml}
    </div>
    <div class="ch-info">
      <div class="ch-name" title="${ch.name}">${ch.name}</div>
      <div class="ch-links">${linksHtml}</div>
    </div>`;
  card.addEventListener("click",()=>window.open(primaryUrl,"_blank","noopener"));
  return card;
}

// -- Cache ---------------------------------------------------------------------
const CACHE_KEY="dttstream_v5";
const CACHE_TTL=6*60*60*1000;
function saveCache(dtt,free,samsung,pluto,rakuten){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),dtt,free,samsung,pluto,rakuten}));}catch(e){}
}
function loadCache(){
  try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||"null");if(c&&Date.now()-c.ts<CACHE_TTL)return c;}catch(e){}return null;
}

async function fetchRace(url){
  const wrap=fn=>new Promise((res,rej)=>fn().then(t=>(t&&t.includes("#EXTINF")?res(t):rej())).catch(rej));
  return Promise.any([
    wrap(()=>fetch(url).then(r=>{if(!r.ok)throw 0;return r.text()})),
    wrap(()=>fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url)).then(r=>r.json()).then(j=>j.contents||"")),
    wrap(()=>fetch("https://corsproxy.io/?"+encodeURIComponent(url)).then(r=>{if(!r.ok)throw 0;return r.text()})),
    wrap(()=>fetch("https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url)).then(r=>{if(!r.ok)throw 0;return r.text()})),
  ]).catch(()=>null);
}

function applyData(dttText,freeText,samsungText,plutoText,rakutenText){
  const rd=dttText?parseM3U(dttText):[];
  const rf=freeText?parseM3U(freeText):[];
  const rs=samsungText?parseM3U(samsungText):[];
  const rp=plutoText?parseM3U(plutoText):[];
  const rr=rakutenText?parseM3U(rakutenText):[];
  if(!rd.length&&!rf.length&&!rs.length&&!rp.length&&!rr.length)throw new Error("no data");
  ALL=buildChannels(rd,[...rf,...rs],rr,rp);
  document.getElementById("ch-count").textContent=ALL.length+" canali";
  document.getElementById("content").innerHTML="";
  renderTabs();renderCats();render();
  initScrollArrows();
}

}
