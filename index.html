<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlutoTV Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3a;
    --accent:#ff6b00; --accent2:#ff9d00; --text:#e8e8f0; --muted:#55556a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #status{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  #status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #status.ok .dot{background:#44ff88}
  #status.err .dot{background:#ff4444}
  #status.loading .dot{background:var(--accent);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .top-bar{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  #search{flex:1;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  #search:focus{border-color:var(--accent)}
  #search::placeholder{color:var(--muted)}
  #refresh-btn{background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.4);color:var(--accent);border-radius:8px;padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background .2s}
  #refresh-btn:hover{background:rgba(255,107,0,.28)}
  #refresh-btn:disabled{opacity:.4;cursor:default}
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
  .cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
  .cat-btn:hover,.cat-btn.active{background:rgba(255,107,0,.15);border-color:var(--accent);color:var(--accent)}
  #err-banner{display:none;margin:14px 24px 0;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.25);border-radius:8px;padding:12px 18px;font-size:13px;color:#ff8888}
  #err-banner.show{display:block}
  #tip{margin:12px 24px;padding:10px 16px;background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.2);border-radius:8px;font-size:12px;color:var(--accent2);display:none}
  #tip.show{display:block}
  .content{padding:24px}
  .category-section{margin-bottom:32px}
  .category-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .ch-card{
    position:relative;
    aspect-ratio:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px 8px 30px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    text-decoration:none;
    color:var(--text);
    cursor:pointer;
    transition:background .15s,border-color .15s,transform .1s;
    overflow:hidden;
  }
  .ch-card:hover{background:#22223a;border-color:var(--accent);transform:translateY(-2px)}
  .ch-card:active{transform:translateY(0)}
  .ch-num{
    position:absolute;
    top:8px;left:10px;
    font-family:'Bebas Neue',sans-serif;
    font-size:13px;
    color:var(--accent);
    letter-spacing:0.5px;
  }
  .ch-logo{width:90px;height:90px;object-fit:contain;border-radius:6px}
  .ch-logo-ph{
    width:90px;height:90px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;
  }
  .ch-name{
    position:absolute;
    bottom:7px;left:0;right:0;
    text-align:center;
    font-size:12px;
    font-weight:500;
    color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:0 8px;
  }
  #ch-count{font-size:13px;color:var(--muted)}
  .skeleton{background:linear-gradient(90deg,var(--card) 25%,#1e1e2e 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;aspect-ratio:1;min-height:160px}
  @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
</style>
</head>
<body>
<header>
  <h1>PLUTO TV</h1>
  <span id="ch-count">Caricamento...</span>
  <div id="status" class="loading"><div class="dot"></div><span id="status-txt">Carico playlist...</span></div>
</header>
<div class="top-bar">
  <input id="search" type="text" placeholder="🔍  Cerca canale..." oninput="renderChannels()">
  <button id="refresh-btn" onclick="loadChannels()" disabled>🔄 Ricarica</button>
</div>
<div class="cat-filter" id="cat-filter"></div>
<div id="err-banner"></div>
<div id="tip">✅ Playlist caricata — clicca un canale per aprire lo stream</div>
<div class="content" id="content">
  <div class="ch-grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<script>
const M3U_URL = "https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/refs/heads/main/playlists/plutotv_it.m3u";

let channelsData = [];
let activeCat = "Tutti";

function setStatus(state, txt) {
  const el = document.getElementById("status");
  el.className = state;
  document.getElementById("status-txt").textContent = txt;
}
function showErr(msg) {
  const b = document.getElementById("err-banner");
  if (msg) { b.textContent = "❌ " + msg; b.classList.add("show"); }
  else b.classList.remove("show");
}

function parseM3U(text) {
  const lines = text.split('\n');
  const channels = [];
  let current = null;
  for (const line of lines) {
    const l = line.trim();
    if (l.startsWith('#EXTINF')) {
      current = {};
      const nameMatch = l.match(/,(.+)$/);
      if (nameMatch) current.name = nameMatch[1].trim();
      const logoMatch = l.match(/tvg-logo="([^"]+)"/);
      if (logoMatch) current.logo = logoMatch[1];
      const numMatch = l.match(/tvg-chno="([^"]+)"/);
      if (numMatch) current.num = parseInt(numMatch[1]) || 9999;
      const groupMatch = l.match(/group-title="([^"]+)"/);
      if (groupMatch) current.cat = groupMatch[1];
    } else if (l.startsWith('http') && current) {
      current.url = l;
      if (!current.cat) current.cat = "Vari";
      channels.push(current);
      current = null;
    }
  }
  return channels;
}

async function loadChannels() {
  document.getElementById("refresh-btn").disabled = true;
  setStatus("loading", "Carico playlist...");
  showErr(null);
  document.getElementById("tip").classList.remove("show");

  try {
    const res = await fetch(M3U_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    channelsData = parseM3U(text);
    channelsData.sort((a, b) => (a.num || 9999) - (b.num || 9999));

    document.getElementById("ch-count").textContent = `${channelsData.length} canali IT`;
    setStatus("ok", "Playlist caricata ✓");
    document.getElementById("tip").classList.add("show");
    renderCatFilter();
    renderChannels();
  } catch(e) {
    setStatus("err", "Errore");
    showErr("Impossibile caricare la playlist: " + e.message);
    document.getElementById("content").innerHTML = "";
  }

  document.getElementById("refresh-btn").disabled = false;
}

function renderCatFilter() {
  const el = document.getElementById("cat-filter");
  el.innerHTML = "";
  const cats = ["Tutti", ...new Set(channelsData.map(c => c.cat))];
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === activeCat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; renderCatFilter(); renderChannels(); };
    el.appendChild(btn);
  });
}

function renderChannels() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = channelsData.filter(c => {
    const ms = !q || (c.name||'').toLowerCase().includes(q) || String(c.num).includes(q);
    const mc = activeCat === "Tutti" || c.cat === activeCat;
    return ms && mc;
  });

  const groups = {};
  for (const ch of filtered) {
    if (!groups[ch.cat]) groups[ch.cat] = [];
    groups[ch.cat].push(ch);
  }

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (filtered.length === 0) {
    content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Nessun canale trovato</div>';
    return;
  }

  document.getElementById("ch-count").textContent = `${filtered.length} / ${channelsData.length} canali IT`;

  for (const [cat, chs] of Object.entries(groups)) {
    const sec = document.createElement("div");
    sec.className = "category-section";
    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = cat;
    sec.appendChild(title);
    const grid = document.createElement("div");
    grid.className = "ch-grid";
    for (const ch of chs) {
      const a = document.createElement("a");
      a.className = "ch-card";
      a.href = "#";
      const initials = (ch.name||'??').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const num = ch.num && ch.num < 9000 ? String(ch.num).padStart(3,'0') : '—';
      a.innerHTML = `
        <span class="ch-num">${num}</span>
        ${ch.logo
          ? `<img class="ch-logo" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=ch-logo-ph>${initials}</div>'">`
          : `<div class="ch-logo-ph">${initials}</div>`}
        <span class="ch-name">${ch.name||''}</span>`;
      a.addEventListener("click", e => {
        e.preventDefault();
        if (ch.url) window.open(ch.url, "_blank", "noopener");
      });
      grid.appendChild(a);
    }
    sec.appendChild(grid);
    content.appendChild(sec);
  }
}

loadChannels();
setInterval(loadChannels, 6 * 60 * 60 * 1000);
</script>
</body>
</html>
