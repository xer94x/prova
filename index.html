<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPG Italia — Guida TV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#080c10;--surface:#0d1117;--card:#111720;--card2:#161e2a;
  --border:#1c2535;--border2:#253040;
  --accent:#00d4ff;--accent2:#0099cc;--accentdim:rgba(0,212,255,.1);
  --red:#ff4d6d;--gold:#ffd166;--green:#06d6a0;
  --text:#dde4f0;--muted:#3a4a5a;--muted2:#5a7080;--muted3:#8090a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:46px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100}
.logo{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.logo-epg{color:var(--accent)}.logo-it{color:var(--text)}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:livepulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--red)}50%{opacity:.3;box-shadow:0 0 2px var(--red)}}
.hdr-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted3);background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 7px;flex-shrink:0}
.hdr-search{background:var(--card);border:1px solid var(--border2);border-radius:5px;padding:5px 10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;outline:none;width:170px;transition:border-color .2s,width .2s}
.hdr-search:focus{border-color:var(--accent);width:210px}
.hdr-search::placeholder{color:var(--muted2)}
.hdr-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.status-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.status-dot.loading{background:var(--accent);animation:blink .8s infinite}
.status-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.main{display:flex;flex:1;overflow:hidden}
.ch-panel{width:430px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
.ch-list{flex:1;overflow-y:auto;overflow-x:hidden}
.ch-item{display:flex;align-items:center;gap:10px;padding:14px 14px;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;transition:background .1s;position:relative;min-height:86px}
.ch-item:hover{background:var(--card)}
.ch-item.active{background:var(--card2);border-left:2px solid var(--accent)}
.ch-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--muted);width:30px;text-align:right;flex-shrink:0}
.ch-logo-wrap{width:50px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:4px;flex-shrink:0;overflow:hidden}
.ch-logo{max-width:46px;max-height:30px;object-fit:contain;display:block}
.ch-logo-ph{font-size:9px;font-weight:700;color:var(--muted2);text-align:center;padding:2px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ch-now{font-size:14px;color:var(--muted3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px;line-height:1.2}
.ch-now-title{color:var(--accent2);font-weight:500}
.ch-prog-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));opacity:.45}
.epg-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.epg-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;flex-shrink:0}
.epg-ch-title{display:flex;align-items:center;gap:12px}
.epg-logo-wrap{width:54px;height:38px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.epg-logo{max-width:48px;max-height:32px;object-fit:contain}
.epg-logo-ph{font-size:10px;font-weight:700;color:var(--muted2);padding:4px}
.epg-ch-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.epg-ch-sub{font-size:11px;color:var(--muted3);margin-top:2px}
.epg-date-tabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.date-tab{background:transparent;border:1px solid var(--border2);border-radius:4px;padding:4px 10px;font-size:10px;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.date-tab:hover{border-color:var(--accent2);color:var(--text)}
.date-tab.active{background:var(--accentdim);border-color:rgba(0,212,255,.4);color:var(--accent)}
.epg-list{flex:1;overflow-y:auto;padding:10px 14px}
.prog-item{display:flex;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:5px;border:1px solid transparent;transition:background .12s,border-color .12s;position:relative;overflow:hidden}
.prog-item:hover{background:var(--card);border-color:var(--border)}
.prog-item.now{background:var(--card2);border-color:rgba(0,212,255,.22)}
.prog-item.now::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:3px 0 0 3px}
.prog-item.past{opacity:.4}
.prog-time{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--muted3);width:44px;flex-shrink:0;padding-top:1px;line-height:1.5}
.prog-item.now .prog-time{color:var(--accent)}
.prog-body{flex:1;min-width:0}
.prog-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.prog-item.now .prog-title{color:var(--accent)}
.prog-desc{font-size:11px;color:var(--muted3);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prog-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.prog-tag{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--muted3)}
.prog-tag.live{background:rgba(255,77,109,.12);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.prog-dur{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding-top:2px;flex-shrink:0}
.prog-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
.skel-ch{height:52px;background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-bottom:1px solid rgba(255,255,255,.025)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.center-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted2);padding:40px;text-align:center}
.center-msg .icon{font-size:52px;opacity:.18}
.center-msg .ttl{font-size:15px;font-weight:600;color:var(--muted3)}
.center-msg .sub{font-size:12px;line-height:1.6;max-width:280px}
.retry-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);padding:7px 16px;border-radius:5px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;transition:background .15s;margin-top:6px}
.retry-btn:hover{background:rgba(0,212,255,.2)}
</style>
</head>

      return{id:canon,name:local?local.name:canon,logo:local?local.logo:(entry.logo||''),lcn:local?local.lcn:getLCNW(canon)};\n
    });\n
    const nameMap={};const nameToCanons={};\n
    for(const ch of rawList){\n
      const k=ch.name.toLowerCase();\n
      if(!nameMap[k]){nameMap[k]=ch;nameToCanons[k]=[ch.id];}\n
      else{nameToCanons[k].push(ch.id);if(ch.lcn<nameMap[k].lcn)nameMap[k]={...ch};}\n
    }\n
    for(const [nameKey,canons] of Object.entries(nameToCanons)){\n
      if(canons.length<=1)continue;\n
      const winId=nameMap[nameKey].id;\n
      if(!progMap[winId])progMap[winId]=new Map();\n
      for(const cid of canons){\n
        if(cid===winId)continue;\n
        if(progMap[cid])for(const [tk,p] of progMap[cid])if(!progMap[winId].has(tk))progMap[winId].set(tk,p);\n
      }\n
    }\n
    const programmes={};\n
    for(const [nameKey,ch] of Object.entries(nameMap)){\n
      const map=progMap[ch.id];\n
      if(map){\n
        const seen=new Set();\n
        const deduped=[];\n
        for(const p of [...map.values()].sort((a,b)=>a.startMs-b.startMs)){\n
          const roundedMin=Math.round(p.startMs/60000);\n
          const k=roundedMin+'|'+p.title.toLowerCase().replace(/\\s+/g,' ').trim();\n
          if(!seen.has(k)){seen.add(k);deduped.push(p);}\n
        }\n
        programmes[ch.id]=deduped;\n
      }\n
    }\n
    const chList=Object.values(nameMap);\n
    self.postMessage({ok:true,channels:chList,programmes});\n
  }catch(ex){\n
    self.postMessage({ok:false,error:ex.message});\n
  }\n
};\n
`;
    const blob=new Blob([workerSrc],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    const w=new Worker(url);
    w.onmessage=e=>{
      URL.revokeObjectURL(url);
      w.terminate();
      if(!e.data.ok){reject(new Error(e.data.error));return;}
      // Riconverti i timestamp in Date objects
      const progs=e.data.programmes;
      for(const id of Object.keys(progs)){
        progs[id]=progs[id].map(p=>({
          start:new Date(p.startMs),
          stop:p.stopMs!=null?new Date(p.stopMs):null,
          title:p.title,desc:p.desc,category:p.category
        }));
      }
      resolve({channels:e.data.channels,programmes:progs});
    };
    w.onerror=ex=>{URL.revokeObjectURL(url);w.terminate();reject(ex);};
    w.postMessage(xml);
  });
}

// Unisce i programmi di due feed parsed mantenendo dedup per minuto+titolo
function mergeParsed(base, extra){
  for(const [chId, extraProgs] of Object.entries(extra.programmes)){
    if(!base.programmes[chId]){
      base.programmes[chId]=extraProgs;
    } else {
      const seen=new Set(base.programmes[chId].map(p=>Math.round(p.start.getTime()/60000)+'|'+p.title.toLowerCase().replace(/\s+/g,' ').trim()));
      for(const p of extraProgs){
        const k=Math.round(p.start.getTime()/60000)+'|'+p.title.toLowerCase().replace(/\s+/g,' ').trim();
        if(!seen.has(k)){seen.add(k);base.programmes[chId].push(p);}
      }
      base.programmes[chId].sort((a,b)=>a.start-b.start);
    }
  }
  // Aggiungi canali presenti solo nel feed extra
  const baseNames=new Set(base.channels.map(c=>c.name.toLowerCase()));
  for(const ch of extra.channels){
    if(!baseNames.has(ch.name.toLowerCase())){base.channels.push(ch);baseNames.add(ch.name.toLowerCase());}
  }
  return base;
}
