<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTTstream — Digitale Terrestre Italia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');
:root{
  --bg:#08080e;--surface:#0f0f1a;--card:#141420;--card2:#1a1a2a;
  --border:#1e1e30;--border2:#2a2a40;
  --accent:#2979ff;--accent2:#82b1ff;--adim:rgba(41,121,255,.1);
  --red:#ff1744;--gold:#ffd740;
  --text:#e2e2ee;--muted:#44445a;--muted2:#6a6a85;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.logo-a{color:var(--accent)}.logo-b{color:var(--text)}
#ch-count{font-size:11px;color:var(--muted2)}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted2);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 9px}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.pill.ok .dot{background:var(--accent);box-shadow:0 0 4px var(--accent)}
.pill.err .dot{background:var(--red)}
.pill.loading .dot{background:var(--accent2);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
#search{flex:1;max-width:320px;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted2)}
.btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--muted2);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btn:disabled{opacity:.3;cursor:default}
.tabs-wrap{position:relative;background:var(--surface);border-bottom:1px solid var(--border);min-height:36px}
.tabs-arrow{position:absolute;top:0;bottom:0;width:32px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--surface) 60%,transparent);border:none;color:var(--muted2);font-size:14px;cursor:pointer;z-index:2;transition:color .15s}
.tabs-arrow:hover{color:var(--accent2)}
.tabs-arrow.left{left:0}
.tabs-arrow.right{right:0;background:linear-gradient(270deg,var(--surface) 60%,transparent)}
.tabs-arrow.hidden{opacity:0;pointer-events:none}
.group-tabs{padding:0 36px;display:flex;gap:0;overflow-x:auto;scroll-behavior:smooth;min-height:36px;align-items:center}
.group-tabs::-webkit-scrollbar{height:0}
.gtab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.gtab:hover{color:var(--text)}
.gtab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.cats-wrap{position:relative;background:var(--card);border-bottom:1px solid var(--border);min-height:32px}
.cats-arrow{position:absolute;top:0;bottom:0;width:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--card) 60%,transparent);border:none;color:var(--muted2);font-size:12px;cursor:pointer;z-index:2;transition:color .15s}
.cats-arrow:hover{color:var(--accent2)}
.cats-arrow.left{left:0}
.cats-arrow.right{right:0;background:linear-gradient(270deg,var(--card) 60%,transparent)}
.cats-arrow.hidden{opacity:0;pointer-events:none}
.cat-strip{padding:5px 32px;display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;min-height:32px;align-items:center}
.cat-strip::-webkit-scrollbar{height:0}
.cat-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 9px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-btn:hover,.cat-btn.active{background:var(--adim);border-color:rgba(41,121,255,.4);color:var(--accent2)}
.content{padding:14px 18px 60px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.ch-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:background .18s,border-color .18s,transform .15s,box-shadow .18s;}
.ch-card:hover{background:var(--card2);border-color:rgba(41,121,255,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ch-logo-wrap{height:82px;display:flex;align-items:center;justify-content:center;padding:12px;background:#1a1a2e;position:relative;overflow:hidden;flex-shrink:0;}
.ch-logo-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}
.ch-num{position:absolute;top:5px;left:6px;font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:rgba(255,255,255,.55);background:rgba(0,0,0,.55);border-radius:3px;padding:1px 4px;z-index:3;letter-spacing:.3px;line-height:1.6}
.ch-src{position:absolute;top:6px;right:7px;font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.3px;padding:1px 4px;border-radius:3px;z-index:3;line-height:1.6}
.src-multi{background:rgba(41,121,255,.12);border:1px solid rgba(41,121,255,.3);color:#82b1ff}
.src-brand{background:rgba(255,215,64,.1);border:1px solid rgba(255,215,64,.3);color:var(--gold);font-size:7px;letter-spacing:.5px}
.ch-logo{max-width:100%;max-height:52px;object-fit:contain;display:block;position:relative;z-index:1;transition:transform .3s}
.ch-card:hover .ch-logo{transform:scale(1.06)}
.ch-logo-ph{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#1c1c30,#2a1c30);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--muted2)}
.ch-info{padding:8px 8px 10px;display:flex;flex-direction:column;gap:6px;flex:1}
.ch-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-links{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.lnk-btn{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:3px;border-radius:5px;padding:4px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;border:1px solid;}
.lnk-local{background:rgba(41,121,255,.12);border-color:rgba(41,121,255,.3);color:#82b1ff}
.lnk-local:hover{background:rgba(41,121,255,.22);border-color:#82b1ff}
.lnk-dtt{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.3);color:#00e5ff}
.lnk-dtt:hover{background:rgba(0,229,255,.22);border-color:#00e5ff}
.lnk-free{background:rgba(255,23,68,.12);border-color:rgba(255,23,68,.3);color:#ff5277}
.lnk-free:hover{background:rgba(255,23,68,.22);border-color:#ff5277}
.lnk-webtv,.lnk-netplus{background:rgba(123,36,28,.15);border-color:rgba(123,36,28,.5);color:#c0524a}
.lnk-webtv:hover,.lnk-netplus:hover{background:rgba(123,36,28,.25);border-color:#c0524a}
.lnk-samsung{background:rgba(255,109,0,.12);border-color:rgba(255,109,0,.3);color:#ff9800}
.lnk-samsung:hover{background:rgba(255,109,0,.22);border-color:#ff9800}
.lnk-rakuten{background:rgba(170,0,255,.12);border-color:rgba(170,0,255,.3);color:#ce93d8}
.lnk-rakuten:hover{background:rgba(170,0,255,.22);border-color:#ce93d8}
.lnk-pluto{background:rgba(255,215,64,.12);border-color:rgba(255,215,64,.3);color:#ffd740}
.lnk-pluto:hover{background:rgba(255,215,64,.22);border-color:#ffd740}
.lnk-lg,.lnk-wedo{background:rgba(29,233,182,.12);border-color:rgba(29,233,182,.3);color:#1de9b6}
.lnk-lg:hover,.lnk-wedo:hover{background:rgba(29,233,182,.22);border-color:#1de9b6}
.epg-btn{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:4px 6px;font-size:9px;font-weight:600;color:var(--muted2);cursor:pointer;transition:all .15s;margin-top:6px;width:100%;text-align:center;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.epg-btn:hover{border-color:var(--accent);color:var(--accent2);background:var(--adim);}
.epg-container{display:none;margin-top:8px;overflow-x:auto;scroll-behavior:smooth;border-top:1px solid var(--border);padding-top:6px;}
.epg-container.show{display:block;}
.epg-timeline{display:flex;flex-direction:row;gap:8px;padding-bottom:4px;}
.epg-item{flex:0 0 auto;width:130px;background:var(--surface);border-radius:6px;padding:6px 8px;border-left:2px solid var(--accent);font-size:10px;line-height:1.3;}
.epg-time{font-weight:700;color:var(--accent2);margin-bottom:3px;font-size:9px;}
.epg-title{font-weight:600;white-space:normal;word-break:break-word;}
.epg-sub{font-size:9px;color:var(--muted2);margin-top:4px;}
.skeleton{border-radius:10px;min-height:148px;background:linear-gradient(90deg,var(--card) 25%,#181828 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
#empty{display:none;padding:60px;text-align:center;color:var(--muted2);font-size:13px}
#empty.show{display:block}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
<header>
  <div class="logo"><span class="logo-a">DTT</span><span class="logo-b">stream</span> 🇮🇹</div>
  <span id="ch-count">Caricamento...</span>
  <div class="hdr-r">
    <div class="pill loading" id="spill"><div class="dot"></div><span id="stxt">Carico...</span></div>
  </div>
</header>
<div class="top-bar">
  <input id="search" type="text" placeholder="🔍  Cerca canale..." oninput="render()">
  <button class="btn" id="rbtn" onclick="init(true)" disabled>↺ Ricarica</button>
</div>
<div class="tabs-wrap">
  <button class="tabs-arrow left hidden" id="tabs-left" onclick="scrollTabs(-1)">&#8249;</button>
  <div class="group-tabs" id="gtabs"></div>
  <button class="tabs-arrow right hidden" id="tabs-right" onclick="scrollTabs(1)">&#8250;</button>
</div>
<div class="cats-wrap">
  <button class="cats-arrow left hidden" id="cats-left" onclick="scrollCats(-1)">&#8249;</button>
  <div class="cat-strip" id="cstrip"></div>
  <button class="cats-arrow right hidden" id="cats-right" onclick="scrollCats(1)">&#8250;</button>
</div>
<div class="content" id="content"><div class="ch-grid" id="skel"></div></div>
<div id="empty">Nessun canale trovato</div>
<script>
function updateArrows(el,lBtn,rBtn){lBtn.classList.toggle("hidden",el.scrollLeft<=4);rBtn.classList.toggle("hidden",el.scrollLeft>=el.scrollWidth-el.clientWidth-4);}
function scrollTabs(d){document.getElementById("gtabs").scrollBy({left:d*200,behavior:"smooth"})}
function scrollCats(d){document.getElementById("cstrip").scrollBy({left:d*200,behavior:"smooth"})}
function initScrollArrows(){
  const tabs=document.getElementById("gtabs"),cats=document.getElementById("cstrip");
  const tl=document.getElementById("tabs-left"),tr=document.getElementById("tabs-right");
  const cl=document.getElementById("cats-left"),cr=document.getElementById("cats-right");
  tabs.addEventListener("scroll",()=>updateArrows(tabs,tl,tr));
  cats.addEventListener("scroll",()=>updateArrows(cats,cl,cr));
  setTimeout(()=>{updateArrows(tabs,tl,tr);updateArrows(cats,cl,cr)},100);
}
const GROUP_ORDER=["RAI","Mediaset","Nazionali","Internazionali","Sport","News","Kids","Musica","Religiosi","Cinema","Streaming","Regioni","Altro"];
const GROUP_EMOJI={"RAI":"📺","Mediaset":"📡","Nazionali":"🇮🇹","Internazionali":"🌍","Sport":"⚽","News":"📰","Kids":"🧒","Musica":"🎵","Religiosi":"🙏","Cinema":"🎬","Streaming":"▶️","Regioni":"🏘","Altro":"📡"};
const STREAMING_SUBCAT_ORDER=['Novità','Cinema','Serie','Sport','Kids','Musica','Natura & Doc','Food & Lifestyle','News','Comedy','Intrattenimento','Horror','Western','Romance','Rakuten Viki'];
const ALL_REGIONI=["Abruzzo","Basilicata","Calabria","Campania","Emilia Romagna","Friuli VG","Lazio","Liguria","Lombardia","Marche","Molise","Piemonte","Puglia","Sardegna","Sicilia","Toscana","Trentino AA","Umbria","Valle d'Aosta","Veneto"];
function groupLabel(g){return (GROUP_EMOJI[g]||"")+" "+g}
function groupSortIdx(g){const i=GROUP_ORDER.indexOf(g);return i>=0?i:GROUP_ORDER.length;}
const GMAP={
  "Canali RAI":"RAI","Canali Mediaset":"Mediaset","Altri Canali Nazionali":"Nazionali","Canali per Bambini/Ragazzi":"Kids",
  "Canali Sport Italiani":"Sport","News e Canali Istituzionali":"News","Canali Religiosi":"Religiosi","Canali Musicali (Web Radio)":"Musica",
  "Samsung Channels":"Streaming","LG Channels":"Streaming","Rakuten Tv":"Streaming","Wedo Tv":"Streaming",
  "Sicilia":"Regioni","Campania":"Regioni","Calabria":"Regioni","Puglia":"Regioni","Lombardia":"Regioni","Lazio":"Regioni",
  "Toscana":"Regioni","Emilia Romagna":"Regioni","Veneto":"Regioni","Piemonte":"Regioni","Sardegna":"Regioni","Abruzzo":"Regioni",
  "Basilicata":"Regioni","Friuli Venezia Giulia":"Regioni","Liguria":"Regioni","Marche":"Regioni","Molise":"Regioni",
  "Trentino Alto Adige":"Regioni","Umbria":"Regioni","Valle D'Aosta":"Regioni","Altro/HbbTv":"Altro",
};
const REGIONE_RAW={"Sicilia":"Sicilia","Campania":"Campania","Calabria":"Calabria","Puglia":"Puglia","Lombardia":"Lombardia","Lazio":"Lazio","Toscana":"Toscana","Emilia Romagna":"Emilia Romagna","Veneto":"Veneto","Piemonte":"Piemonte","Sardegna":"Sardegna","Abruzzo":"Abruzzo","Basilicata":"Basilicata","Friuli Venezia Giulia":"Friuli VG","Liguria":"Liguria","Marche":"Marche","Molise":"Molise","Trentino Alto Adige":"Trentino AA","Umbria":"Umbria","Valle D'Aosta":"Valle d'Aosta"};
function localGroupMap(g){
  const m={"RAI":"RAI","MEDIASET":"Mediaset","SKY":"Nazionali","DISCOVERY":"Nazionali","SPORT":"Sport","KIDS":"Kids","MUSICA":"Musica","INTERNAZIONALE":"Internazionali","WEB":"Altro","NAZIONALI":"Nazionali"};
  return m[(g||"").toUpperCase()]||"Nazionali";
}
function getLgSubcat(num){
  if(!num)return"Cinema";
  if((num>=100&&num<=253)||num===999)return"Cinema";
  if(num>=305&&num<=484)return"Serie & Fiction";
  if(num>=489&&num<=491)return"Comedy";
  if(num>=511&&num<=517)return"Crime";
  if(num>=534&&num<=565)return"Intrattenimento";
  if(num>=610&&num<=637)return"Food & Lifestyle";
  if(num>=642&&num<=679)return"Natura & Doc";
  if(num>=700&&num<=747)return"Sport";
  if(num>=801&&num<=814)return"Rakuten Viki";
  if(num>=844&&num<=941)return"Kids & Anime";
  if(num>=955&&num<=981)return"Musica";
  if(num>=985&&num<=998)return"News";
  return"Cinema";
}
function normalizeStreamingSubcat(sg){
  if(!sg)return"Cinema";
  const s=sg.toLowerCase().trim();
  if(/serie|fiction|classich|soap|k.drama/.test(s))return"Serie";
  if(/natura|doc|wildlife|guardia/.test(s))return"Natura & Doc";
  if(/news|notizie|mondo/.test(s))return"News";
  if(/kids|anime|animaz|bambini|teen|junior/.test(s))return"Kids";
  if(/cinema|film|movie/.test(s))return"Cinema";
  if(/\bsport\b|motori|calcio|football|tennis|golf|boxing|\bmma\b|rally|basket/.test(s))return"Sport";
  if(/food|lifestyle|cucina|viaggi|gambero|gusto|beauty|\bmoda\b|design/.test(s))return"Food & Lifestyle";
  if(/musica|music|radio|vevo|\brock\b|\bpop\b|jazz|kpop|k.pop|stingray|trace|deejay|rtl/.test(s))return"Musica";
  if(/comedy|commedia|risate|smile|laughs/.test(s))return"Comedy";
  if(/intrattenimento|reality|shore|paranormal|crime time|real life|dateline/.test(s))return"Intrattenimento";
  if(/rakuten viki|viki/.test(s))return"Rakuten Viki";
  if(/horror/.test(s))return"Horror";
  if(/western/.test(s))return"Western";
  if(/romanc|romance/.test(s))return"Romance";
  if(/novit/.test(s))return"Novità";
  if(/true crime/.test(s))return"Intrattenimento";
  if(/donne|protagoniste|notti|rakuten tv/.test(s))return"Cinema";
  return"Cinema";
}
function getSamsungSubcat(rg){
  const m={"Film":"Cinema","Serie TV":"Serie & Fiction","Documentari":"Natura & Doc","Sport":"Sport","Calcio":"Sport","News":"News","Musica":"Musica","Bambini":"Kids & Anime","Crime":"Crime","Intrattenimento":"Food & Lifestyle","Cucina & Viaggi":"Food & Lifestyle"};
  return m[rg]||"Cinema";
}
function getStreamingSubcat(name,url,rawGroup,group){
  if(group==="Samsung"&&rawGroup)return getSamsungSubcat(rawGroup);
  if(group==="Pluto"&&rawGroup)return normalizeStreamingSubcat(rawGroup);
  if(group==="Rakuten"&&rawGroup)return rawGroup;
  const n=name.toLowerCase();
  if(/action|avventura|film d.az/.test(n))return"Film d'azione";
  if(/commedia|comedy/.test(n))return"Commedia";
  if(/dramma|drama/.test(n))return"Dramma";
  if(/thriller|brivid|suspense/.test(n))return"Thriller";
  if(/horror|paura/.test(n))return"Horror";
  if(/fantascienza|sci.fi/.test(n))return"Fantascienza";
  if(/bambini|kids|cartoni|animaz/.test(n))return"Bambini";
  if(/romanc|amore/.test(n))return"Romantico";
  if(/family|famiglia/.test(n))return"Family";
  if(/doc|nature|natur|discovery|animal/.test(n))return"Documentari";
  if(/news|notizie/.test(n))return"News";
  if(/sport|calcio|football/.test(n))return"Sport";
  if(/music|musica/.test(n))return"Musica";
  if(/serie|fiction|show/.test(n))return"Serie";
  if(/crime|poliziesc/.test(n))return"Crime";
  if(/cucina|food|lifestyle|viaggio/.test(n))return"Food & Lifestyle";
  if(/asiatici/.test(n))return"Film Asiatici";
  if(/western/.test(n))return"Western";
  return"Film";
}
function freetvGroup(name,url){
  const n=name.toLowerCase(),u=(url||"").toLowerCase();
  if(/\brain\b|rai\s*\d|rai\s*(news|sport|movie|storia|scuola|gulp|yoyo|premium)/.test(n))return"RAI";
  if(/canale\s*5|italia\s*1|rete\s*4|cine\s*34|\biris\b|la\s*5|top crime|tgcom|20 mediaset|27 twenty/.test(n))return"Mediaset";
  if(u.includes("stvp-")||u.includes("samsungcloud")||u.includes("samsung.wurl"))return"Streaming";
  if(u.includes("rakuten")||n.startsWith("rakuten tv"))return"Streaming";
  if(u.includes("mjh.nz/lg")||u.includes("lgchannels")||u.includes("lg.com/channels"))return"Streaming";
  if(/\bsport\b|calcio|tennis|motor|football|supertennis|sportitalia/.test(n))return"Sport";
  if(/\bnews\b|tg\s*\d|tg24|notizie|giornale|euronews/.test(n))return"News";
  if(/yoyo|gulp|boing|cartoon|junior|\bkids\b|super!|cartoonito/.test(n))return"Kids";
  if(/music|\bradio\b|rtl|deejay|m2o|vevo|trace|virgin|\bmtv\b/.test(n))return"Musica";
  if(/padre pio|maria|vangelo|cristian|chiesa|vatica|cenacolo|pace tv|tv2000/.test(n))return"Religiosi";
  return"Nazionali";
}
function stripQuality(name){
  return name
    .replace(/\s*[\|\-–—]\s*(FHD|HD|SD|4K|UHD|720p|1080p|1080i|576p|480p)\b/gi,"")
    .replace(/\s*[\[\(]\s*(FHD|HD|SD|4K|UHD|720p|1080p|1080i|576p|480p)\s*[\]\)]/gi,"")
    .replace(/\s+(FHD|HD|SD|4K|UHD|720p|1080p|1080i|576p|480p)\b/gi,"")
    .trim();
}

  for(const r of (rawPluto||[])){
    if(!r.url||!r.name)continue;
    let cname=stripQuality(r.name.trim());
    const pa=resolveAlias(cname);if(pa)cname=pa;else{const ps=_stripSuf(_normAlias(cname));const pa2=resolveAlias(ps);if(pa2)cname=pa2;}
    const key=normKey(cname);const sg=normalizeStreamingSubcat(r.group||"Film");
    if(!map[key]){map[key]={name:cname,logo:null,group:"Streaming",subgroup:sg,brand:"Pluto",dttNum:null,streams:[],seenUrls:new Set(),logoPrio:99};}
    const ch=map[key];ch.group="Streaming";ch.subgroup=applySubgroupOverride(cname,sg);
    const lp=LOGO_PRIO["pluto"];
    if(r.logo&&lp<ch.logoPrio){ch.logo=r.logo;ch.logoPrio=lp;}
    if(!ch.seenUrls.has(r.url)){ch.seenUrls.add(r.url);ch.streams.push({url:r.url,source:"pluto",label:null});}
  }

  // ── Ordina stream per priorità ──────────────────────────────────────────────
  // stream: dtt:1, free:2, netplus:3, webtv:4, local:5, samsung:6, pluto:7, lg:8, wedo:8, rakuten:9
  const SRC_PRIO={dtt:1,free:2,local:3,netplus:4,webtv:5,samsung:6,pluto:7,lg:8,wedo:8,rakuten:9};
  for(const ch of Object.values(map)){
    ch.streams.sort((a,b)=>{
      const isSony=ch.name.toLowerCase().includes("sony one");
      let pa=SRC_PRIO[a.source]||99,pb=SRC_PRIO[b.source]||99;
      if(isSony){if(a.source==="dtt"||a.source==="lg")pa=0;if(b.source==="dtt"||b.source==="lg")pb=0;}
      return pa-pb;
    });
    const total=ch.streams.length;
    ch.streams.forEach((s,i)=>{s.label=total===1?"▶ Guarda":`${i+1}`;});
    delete ch.seenUrls;
    delete ch.logoPrio;
  }
  return Object.values(map).filter(ch=>ch.streams.length>0);
}

function sortChannels(arr){
  return [...arr].sort((a,b)=>{
    const an=a.dttNum?parseInt(a.dttNum):null,bn=b.dttNum?parseInt(b.dttNum):null;
    if(an!==null&&bn!==null)return an-bn;
    if(an!==null&&bn===null)return -1;
    if(an===null&&bn!==null)return 1;
    const ag=groupSortIdx(a.group),bg=groupSortIdx(b.group);
    return ag-bg||a.name.localeCompare(b.name,"it");
  });
}

let epgData = null; // will store { channelMap: { normalizedName: [programs] } }
let epgLoading = false;

async function fetchAndParseEPG() {
  if (epgData !== null) return epgData;
  if (epgLoading) return null;
  epgLoading = true;
  try {
    const url = "https://www.epgitalia.tv/gzip";
    const response = await fetch(url);
    if (!response.ok) throw new Error("HTTP " + response.status);
    const compressed = await response.arrayBuffer();
    const decompressed = pako.inflate(compressed, { to: "string" });
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(decompressed, "text/xml");
    const programmes = xmlDoc.querySelectorAll("programme");
    const channelMap = new Map(); // key: normalized channel name, value: array of programs sorted by start time
    for (let prog of programmes) {
      const channel = prog.getAttribute("channel");
      if (!channel) continue;
      const start = prog.getAttribute("start");
      const stop = prog.getAttribute("stop");
      const titleElem = prog.querySelector("title");
      const descElem = prog.querySelector("desc");
      const title = titleElem ? titleElem.textContent : "";
      const desc = descElem ? descElem.textContent : "";
      if (!title) continue;
      const normName = normKey(channel);
      if (!channelMap.has(normName)) channelMap.set(normName, []);
      channelMap.get(normName).push({ start, stop, title, desc });
    }
    // sort each channel's programmes by start time
    for (let [_, arr] of channelMap.entries()) {
      arr.sort((a,b) => (a.start || "").localeCompare(b.start || ""));
    }
    epgData = { channelMap };
    console.log("EPG loaded, channels:", channelMap.size);
    return epgData;
  } catch (err) {
    console.error("EPG fetch error:", err);
    return null;
  } finally {
    epgLoading = false;
  }
}

function getCurrentPrograms(programs) {
  if (!programs || programs.length === 0) return [];
  const now = new Date();
  const nowStr = now.toISOString().replace(/[-:]/g, "").slice(0, 14);
  // find current program (start <= now < stop)
  let currentIndex = -1;
  for (let i = 0; i < programs.length; i++) {
    const p = programs[i];
    if (p.start <= nowStr && nowStr < p.stop) {
      currentIndex = i;
      break;
    }
  }
  if (currentIndex === -1) {
    // maybe between programs: return next upcoming
    const next = programs.find(p => p.start > nowStr);
    return next ? [next] : [];
  }
  // return current and next 3 (or up to 4 total)
  const result = [programs[currentIndex]];
  for (let i = currentIndex+1; i < Math.min(currentIndex+4, programs.length); i++) {
    result.push(programs[i]);
  }
  return result;
}

function formatEpgTime(startStr) {
  if (!startStr) return "";
  // startStr format: YYYYMMDDhhmmss +0000
  const year = startStr.slice(0,4);
  const month = startStr.slice(4,6);
  const day = startStr.slice(6,8);
  const hour = startStr.slice(8,10);
  const minute = startStr.slice(10,12);
  return `${day}/${month} ${hour}:${minute}`;
}

function renderEPG(container, programs) {
  container.innerHTML = "";
  if (!programs || programs.length === 0) {
    container.innerHTML = '<div style="padding:6px; font-size:9px; color:var(--muted2); text-align:center;">Nessun programma disponibile</div>';
    return;
  }
  const timeline = document.createElement("div");
  timeline.className = "epg-timeline";
  for (let prog of programs) {
    const item = document.createElement("div");
    item.className = "epg-item";
    const timeSpan = document.createElement("div");
    timeSpan.className = "epg-time";
    timeSpan.textContent = formatEpgTime(prog.start);
    const titleSpan = document.createElement("div");
    titleSpan.className = "epg-title";
    titleSpan.textContent = prog.title || "?";
    item.appendChild(timeSpan);
    item.appendChild(titleSpan);
    if (prog.desc) {
      const descSpan = document.createElement("div");
      descSpan.className = "epg-sub";
      descSpan.textContent = prog.desc.length > 60 ? prog.desc.slice(0,60)+"…" : prog.desc;
      item.appendChild(descSpan);
    }
    timeline.appendChild(item);
  }
  container.appendChild(timeline);
}

async function toggleEPG(cardId, channelName) {
  const container = document.getElementById(`epg-${cardId}`);
  if (!container) return;
  if (container.classList.contains("show")) {
    container.classList.remove("show");
    return;
  }
  // show loading
  container.classList.add("show");
  container.innerHTML = '<div class="epg-timeline"><div class="epg-item" style="width:100%; text-align:center;">Caricamento EPG...</div></div>';
  const epg = await fetchAndParseEPG();
  if (!epg) {
    container.innerHTML = '<div class="epg-timeline"><div class="epg-item" style="width:100%; text-align:center;">EPG non disponibile</div></div>';
    return;
  }
  const normName = normKey(channelName);
  const programs = epg.channelMap.get(normName);
  if (!programs) {
    container.innerHTML = '<div class="epg-timeline"><div class="epg-item" style="width:100%; text-align:center;">Nessun programma trovato per questo canale</div></div>';
    return;
  }
  const currentAndNext = getCurrentPrograms(programs);
  renderEPG(container, currentAndNext);
}
