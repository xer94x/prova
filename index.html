<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --border:#2a2a3a;
    --accent:#e63946; --accent2:#ff6b6b; --text:#e8e8f0; --muted:#55556a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

  /* HEADER */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #status{margin-left:auto;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  #status .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s}
  #status.ok .dot{background:#44ff88}
  #status.err .dot{background:#ff4444}
  #status.loading .dot{background:var(--accent2);animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* TOP BAR */
  .top-bar{padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  #search{flex:1;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  #search:focus{border-color:var(--accent)}
  #search::placeholder{color:var(--muted)}
  #refresh-btn{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.35);color:var(--accent);border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background .2s}
  #refresh-btn:hover{background:rgba(230,57,70,.25)}
  #refresh-btn:disabled{opacity:.4;cursor:default}
  #ch-count{font-size:13px;color:var(--muted);white-space:nowrap}

  /* CAT FILTER */
  .cat-filter{display:flex;gap:6px;flex-wrap:wrap;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border)}
  .cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
  .cat-btn:hover,.cat-btn.active{background:rgba(230,57,70,.15);border-color:var(--accent);color:var(--accent)}

  /* LAYOUT */
  .main{display:flex;height:calc(100vh - 115px);overflow:hidden}

  /* CHANNEL LIST */
  .ch-list{width:320px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--surface)}
  .ch-list::-webkit-scrollbar{width:4px}
  .ch-list::-webkit-scrollbar-track{background:transparent}
  .ch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .ch-section-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2.5px;color:var(--muted);padding:12px 16px 6px;border-bottom:1px solid var(--border);text-transform:uppercase;position:sticky;top:0;background:var(--surface);z-index:1}
  .ch-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(42,42,58,.5);transition:background .12s}
  .ch-item:hover{background:var(--card)}
  .ch-item.active{background:rgba(230,57,70,.12);border-left:3px solid var(--accent)}
  .ch-item.active .ch-item-num{color:var(--accent)}
  .ch-logo-sm{width:40px;height:40px;object-fit:contain;border-radius:6px;background:var(--border);flex-shrink:0}
  .ch-logo-ph-sm{width:40px;height:40px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;color:#fff}
  .ch-item-info{flex:1;min-width:0}
  .ch-item-num{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--muted);line-height:1}
  .ch-item-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
  .ch-now{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .ch-now span{color:var(--accent2)}

  /* PLAYER AREA */
  .player-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
  .video-wrap{position:relative;background:#000;flex-shrink:0}
  .video-wrap video{width:100%;display:block;max-height:55vh;background:#000}
  .no-video{display:flex;align-items:center;justify-content:center;height:320px;color:var(--muted);font-size:14px;flex-direction:column;gap:12px}
  .no-video .icon{font-size:48px;opacity:.3}

  /* CHANNEL INFO BAR */
  .ch-info-bar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
  .ch-info-bar .logo-big{width:48px;height:48px;object-fit:contain;border-radius:8px;background:var(--border)}
  .ch-info-bar .logo-big-ph{width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff}
  .ch-info-bar .title{font-size:18px;font-weight:700;color:#fff}
  .ch-info-bar .now-title{font-size:13px;color:var(--accent2);margin-top:2px}
  .ch-info-bar .now-time{font-size:11px;color:var(--muted);margin-top:1px}

  /* EPG */
  .epg-scroll{flex:1;overflow-y:auto;padding:16px 20px}
  .epg-scroll::-webkit-scrollbar{width:4px}
  .epg-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .epg-day-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:12px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .epg-item{display:flex;gap:12px;padding:9px 12px;border-radius:8px;margin-bottom:4px;border:1px solid transparent;transition:background .12s}
  .epg-item:hover{background:var(--card)}
  .epg-item.now{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.3)}
  .epg-time{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent2);min-width:52px;padding-top:1px}
  .epg-item.now .epg-time{color:var(--accent)}
  .epg-title{font-size:13px;font-weight:700;color:#fff}
  .epg-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .epg-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(230,57,70,.25);color:var(--accent);letter-spacing:1px;margin-left:8px;vertical-align:middle;font-weight:700}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}

  /* GRID VIEW */
  .grid-view{display:none;padding:20px 24px;overflow-y:auto;flex:1}
  .grid-view.active{display:block}
  .grid-section{margin-bottom:28px}
  .grid-section-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
  .ch-card{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px 26px;background:var(--card);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;overflow:hidden}
  .ch-card:hover{background:#22223a;border-color:var(--accent);transform:translateY(-2px)}
  .ch-card:active{transform:translateY(0)}
  .ch-card-num{position:absolute;top:8px;left:10px;font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--accent);letter-spacing:0.5px}
  .ch-card-logo{width:96px;height:96px;object-fit:contain;border-radius:6px}
  .ch-card-ph{width:96px;height:96px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff}
  .ch-card-name{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}

  /* VIEW TOGGLE */
  .view-toggle{display:flex;gap:4px;margin-left:auto}
  .vbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;transition:all .15s}
  .vbtn.active{background:rgba(230,57,70,.15);border-color:var(--accent);color:var(--accent)}

  /* SKELETON */
  .skeleton{background:linear-gradient(90deg,var(--card) 25%,#1e1e2e 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:12px;aspect-ratio:1}
  @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

  /* ERR */
  #err-banner{display:none;margin:14px 24px;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.25);border-radius:8px;padding:12px 18px;font-size:13px;color:#ff8888}
  #err-banner.show{display:block}
</style>
</head>
<body>

<header>
  <h1>IPTV</h1>
  <span id="ch-count">Caricamento...</span>
  <div id="status" class="loading"><div class="dot"></div><span id="status-txt">Carico playlist...</span></div>
</header>

<div class="top-bar">
  <input id="search" type="text" placeholder="🔍  Cerca canale..." oninput="onSearch()">
  <button id="refresh-btn" onclick="init()" disabled>🔄 Ricarica</button>
  <div class="view-toggle">
    <button class="vbtn active" id="vbtn-list" onclick="setView('list')" title="Vista lista">☰</button>
    <button class="vbtn" id="vbtn-grid" onclick="setView('grid')" title="Vista griglia">⊞</button>
  </div>
</div>

<div class="cat-filter" id="cat-filter"></div>
<div id="err-banner"></div>

<!-- LIST VIEW -->
<div class="main" id="list-view">
  <div class="ch-list" id="ch-list">
    <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Caricamento canali...</div>
  </div>
  <div class="player-area" id="player-area">
    <div class="no-video" id="no-video">
      <span class="icon">📺</span>
      <span>Seleziona un canale per iniziare</span>
    </div>
    <div id="video-container" style="display:none">
      <div class="video-wrap">
        <video id="video" controls autoplay></video>
      </div>
      <div class="ch-info-bar" id="ch-info-bar"></div>
      <div class="epg-scroll" id="epg-scroll">
        <div style="color:var(--muted);font-size:13px;padding:20px 0">Caricamento EPG...</div>
      </div>
    </div>
  </div>
</div>

<!-- GRID VIEW -->
<div class="grid-view" id="grid-view"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
const M3U_URL  = "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/TV.m3u8";
const EPG_URL  = "https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/TV.xml";

let channels = [];
let epgData   = {};   // { tvg-id: [ {start, stop, title, desc} ] }
let activeCat = "Tutti";
let currentCh = null;
let hlsInst   = null;
let currentView = "list";

/* ── UTILS ── */
function pad(n){ return String(n).padStart(2,'0'); }
function fmtTime(d){ return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDate(d){
  const days=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
  const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()];
}
function parseEpgDate(s){
  // formato: 20240101123000 +0100
  const m = s.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s*([+-]\d{4})?/);
  if(!m) return new Date(0);
  const base = new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]));
  if(m[7]){
    const sign = m[7][0]==='+' ? -1 : 1;
    const hh = +m[7].slice(1,3), mm = +m[7].slice(3,5);
    base.setMinutes(base.getMinutes() + sign*(hh*60+mm));
  }
  return base;
}
function setStatus(state,txt){
  const el=document.getElementById("status");
  el.className=state;
  document.getElementById("status-txt").textContent=txt;
}
function showErr(msg){
  const b=document.getElementById("err-banner");
  if(msg){b.textContent="❌ "+msg;b.classList.add("show");}
  else b.classList.remove("show");
}

/* ── PARSE M3U ── */
function parseM3U(text){
  const lines=text.split('\n'); const chs=[]; let cur=null;
  for(const line of lines){
    const l=line.trim();
    if(l.startsWith('#EXTINF')){
      cur={};
      const nm=l.match(/,(.+)$/); if(nm) cur.name=nm[1].trim();
      const lo=l.match(/tvg-logo="([^"]+)"/); if(lo) cur.logo=lo[1];
      const nu=l.match(/tvg-chno="([^"]+)"/); if(nu) cur.num=parseInt(nu[1])||9999;
      const id=l.match(/tvg-id="([^"]+)"/); if(id) cur.tvgId=id[1];
      const gr=l.match(/group-title="([^"]+)"/); if(gr) cur.cat=gr[1];
    } else if(l.startsWith('http')&&cur){
      cur.url=l; if(!cur.cat) cur.cat="Vari";
      chs.push(cur); cur=null;
    }
  }
  return chs;
}

/* ── PARSE EPG (XMLTV) ── */
function parseEPG(xmlText){
  const data={};
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(xmlText,'application/xml');
    const progs=doc.querySelectorAll('programme');
    progs.forEach(p=>{
      const ch=p.getAttribute('channel');
      if(!ch) return;
      if(!data[ch]) data[ch]=[];
      const titleEl=p.querySelector('title');
      const descEl=p.querySelector('desc');
      data[ch].push({
        start: parseEpgDate(p.getAttribute('start')||''),
        stop:  parseEpgDate(p.getAttribute('stop')||''),
        title: titleEl ? titleEl.textContent : '',
        desc:  descEl  ? descEl.textContent  : ''
      });
    });
    // sort
    for(const k of Object.keys(data)) data[k].sort((a,b)=>a.start-b.start);
  } catch(e){ console.warn('EPG parse error',e); }
  return data;
}

/* ── LOAD ── */
async function init(){
  document.getElementById("refresh-btn").disabled=true;
  setStatus("loading","Carico playlist...");
  showErr(null);
  try{
    // Load M3U
    const r=await fetch(M3U_URL);
    if(!r.ok) throw new Error("M3U HTTP "+r.status);
    const txt=await r.text();
    channels=parseM3U(txt).sort((a,b)=>(a.num||9999)-(b.num||9999));
    document.getElementById("ch-count").textContent=channels.length+" canali";
    setStatus("loading","Carico EPG...");

    // Load EPG
    try{
      const re=await fetch(EPG_URL);
      if(re.ok){
        const xt=await re.text();
        epgData=parseEPG(xt);
      }
    } catch(e){ console.warn("EPG non caricato",e); }

    setStatus("ok","Pronto ✓");
    buildCatFilter();
    renderList();
    renderGrid();
  } catch(e){
    setStatus("err","Errore");
    showErr("Impossibile caricare la playlist: "+e.message);
  }
  document.getElementById("refresh-btn").disabled=false;
}

/* ── CAT FILTER ── */
function buildCatFilter(){
  const el=document.getElementById("cat-filter"); el.innerHTML="";
  const cats=["Tutti",...new Set(channels.map(c=>c.cat))];
  cats.forEach(cat=>{
    const b=document.createElement("button");
    b.className="cat-btn"+(cat===activeCat?" active":"");
    b.textContent=cat;
    b.onclick=()=>{ activeCat=cat; buildCatFilter(); renderList(); renderGrid(); };
    el.appendChild(b);
  });
}

/* ── FILTER ── */
function filtered(){
  const q=document.getElementById("search").value.toLowerCase();
  return channels.filter(c=>{
    const ms=!q||(c.name||'').toLowerCase().includes(q)||String(c.num||'').includes(q);
    const mc=activeCat==="Tutti"||c.cat===activeCat;
    return ms&&mc;
  });
}
function onSearch(){ renderList(); renderGrid(); }

/* ── LIST RENDER ── */
function renderList(){
  const list=document.getElementById("ch-list"); list.innerHTML="";
  const chs=filtered();
  document.getElementById("ch-count").textContent=chs.length+" / "+channels.length+" canali";
  if(!chs.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Nessun canale trovato</div>';
    return;
  }
  // group by cat
  const groups={};
  for(const ch of chs){ if(!groups[ch.cat]) groups[ch.cat]=[]; groups[ch.cat].push(ch); }
  for(const [cat,chs2] of Object.entries(groups)){
    const lbl=document.createElement("div");
    lbl.className="ch-section-title"; lbl.textContent=cat; list.appendChild(lbl);
    for(const ch of chs2){
      const item=document.createElement("div");
      item.className="ch-item"+(currentCh&&currentCh.url===ch.url?" active":"");
      const init=(ch.name||'??').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const nowProg=getNowProg(ch);
      item.innerHTML=`
        ${ch.logo
          ? `<img class="ch-logo-sm" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=ch-logo-ph-sm>${init}</div>'">`
          : `<div class="ch-logo-ph-sm">${init}</div>`}
        <div class="ch-item-info">
          <div class="ch-item-num">${ch.num&&ch.num<9000?String(ch.num).padStart(3,'0'):'—'}</div>
          <div class="ch-item-name">${ch.name||''}</div>
          ${nowProg?`<div class="ch-now"><span>${fmtTime(nowProg.start)}</span> ${nowProg.title}</div>`:''}
        </div>`;
      item.onclick=()=>playChannel(ch);
      list.appendChild(item);
    }
  }
}

/* ── GRID RENDER ── */
function renderGrid(){
  const gv=document.getElementById("grid-view"); gv.innerHTML="";
  const chs=filtered();
  const groups={};
  for(const ch of chs){ if(!groups[ch.cat]) groups[ch.cat]=[]; groups[ch.cat].push(ch); }
  for(const [cat,chs2] of Object.entries(groups)){
    const sec=document.createElement("div"); sec.className="grid-section";
    const t=document.createElement("div"); t.className="grid-section-title"; t.textContent=cat;
    sec.appendChild(t);
    const grid=document.createElement("div"); grid.className="ch-grid";
    for(const ch of chs2){
      const a=document.createElement("div"); a.className="ch-card";
      const init=(ch.name||'??').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      const num=ch.num&&ch.num<9000?String(ch.num).padStart(3,'0'):'—';
      a.innerHTML=`
        <span class="ch-card-num">${num}</span>
        ${ch.logo
          ? `<img class="ch-card-logo" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=ch-card-ph>${init}</div>'">`
          : `<div class="ch-card-ph">${init}</div>`}
        <span class="ch-card-name">${ch.name||''}</span>`;
      a.onclick=()=>{ setView('list'); playChannel(ch); };
      grid.appendChild(a);
    }
    sec.appendChild(grid); gv.appendChild(sec);
  }
}

/* ── EPG HELPERS ── */
function getNowProg(ch){
  const id=ch.tvgId||ch.name;
  const progs=epgData[id]||epgData[ch.name]||[];
  const now=new Date();
  return progs.find(p=>p.start<=now&&p.stop>now)||null;
}
function getProgs(ch){
  const id=ch.tvgId||ch.name;
  return epgData[id]||epgData[ch.name]||[];
}

/* ── EPG RENDER ── */
function renderEPG(ch){
  const el=document.getElementById("epg-scroll"); el.innerHTML="";
  const progs=getProgs(ch);
  if(!progs.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:16px 0">Nessun dato EPG disponibile</div>';
    return;
  }
  const now=new Date();
  let lastDay="";
  for(const p of progs){
    if(p.stop<now-60000) continue; // skip old (keep current)
    const day=fmtDate(p.start);
    if(day!==lastDay){
      const dt=document.createElement("div"); dt.className="epg-day-title"; dt.textContent=day;
      el.appendChild(dt); lastDay=day;
    }
    const isNow=p.start<=now&&p.stop>now;
    const pct=isNow?Math.round((now-p.start)/(p.stop-p.start)*100):0;
    const dur=Math.round((p.stop-p.start)/60000);
    const item=document.createElement("div");
    item.className="epg-item"+(isNow?" now":"");
    item.innerHTML=`
      <div class="epg-time">${fmtTime(p.start)}</div>
      <div style="flex:1;min-width:0">
        <div class="epg-title">${p.title}${isNow?'<span class="epg-badge">ORA</span>':''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${dur} min</div>
        ${p.desc?`<div class="epg-desc">${p.desc}</div>`:''}
        ${isNow?`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
      </div>`;
    el.appendChild(item);
    if(isNow) setTimeout(()=>item.scrollIntoView({behavior:'smooth',block:'center'}),100);
  }
}

/* ── PLAY ── */
function playChannel(ch){
  currentCh=ch;
  // highlight list
  document.querySelectorAll('.ch-item').forEach(el=>el.classList.remove('active'));
  // show player
  document.getElementById("no-video").style.display="none";
  document.getElementById("video-container").style.display="block";
  // info bar
  const init=(ch.name||'??').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const nowProg=getNowProg(ch);
  document.getElementById("ch-info-bar").innerHTML=`
    ${ch.logo
      ? `<img class="logo-big" src="${ch.logo}" alt="" onerror="this.outerHTML='<div class=logo-big-ph>${init}</div>'">`
      : `<div class="logo-big-ph">${init}</div>`}
    <div>
      <div class="title">${ch.name||''}</div>
      ${nowProg?`<div class="now-title">${nowProg.title}</div><div class="now-time">${fmtTime(nowProg.start)} – ${fmtTime(nowProg.stop)}</div>`:''}
    </div>`;
  // EPG
  renderEPG(ch);
  // VIDEO
  const video=document.getElementById("video");
  if(hlsInst){ hlsInst.destroy(); hlsInst=null; }
  if(Hls.isSupported()){
    hlsInst=new Hls({maxBufferLength:30});
    hlsInst.loadSource(ch.url);
    hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=ch.url;
    video.play().catch(()=>{});
  }
  // re-render list to show active
  renderList();
}

/* ── VIEW TOGGLE ── */
function setView(v){
  currentView=v;
  document.getElementById("list-view").style.display=v==="list"?"flex":"none";
  document.getElementById("grid-view").style.display=v==="grid"?"block":"none";
  document.getElementById("grid-view").className="grid-view"+(v==="grid"?" active":"");
  document.getElementById("vbtn-list").className="vbtn"+(v==="list"?" active":"");
  document.getElementById("vbtn-grid").className="vbtn"+(v==="grid"?" active":"");
}

init();
setInterval(()=>{ if(currentCh) renderEPG(currentCh); }, 60000);
</script>
