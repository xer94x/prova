<head>

<title>EPG Italia — Guida TV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#080c10;--surface:#0d1117;--card:#111720;--card2:#161e2a;
  --border:#1c2535;--border2:#253040;
  --accent:#00d4ff;--accent2:#0099cc;--accentdim:rgba(0,212,255,.1);
  --red:#ff4d6d;--gold:#ffd166;--green:#06d6a0;
  --text:#dde4f0;--muted:#3a4a5a;--muted2:#5a7080;--muted3:#8090a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:46px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100}
.logo{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.logo-epg{color:var(--accent)}.logo-it{color:var(--text)}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:livepulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--red)}50%{opacity:.3;box-shadow:0 0 2px var(--red)}}
.hdr-clock{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted3);background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 7px;flex-shrink:0}
.hdr-search{background:var(--card);border:1px solid var(--border2);border-radius:5px;padding:5px 10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;outline:none;width:170px;transition:border-color .2s,width .2s}
.hdr-search:focus{border-color:var(--accent);width:210px}
.hdr-search::placeholder{color:var(--muted2)}
.hdr-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.status-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.status-dot.loading{background:var(--accent);animation:blink .8s infinite}
.status-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.main{display:flex;flex:1;overflow:hidden}
.ch-panel{width:430px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface)}
.ch-list{flex:1;overflow-y:auto;overflow-x:hidden}
.ch-item{display:flex;align-items:center;gap:10px;padding:14px 14px;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;transition:background .1s;position:relative;min-height:86px}
.ch-item:hover{background:var(--card)}
.ch-item.active{background:var(--card2);border-left:2px solid var(--accent)}
.ch-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--muted);width:30px;text-align:right;flex-shrink:0}
.ch-logo-wrap{width:50px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:4px;flex-shrink:0;overflow:hidden}
.ch-logo{max-width:46px;max-height:30px;object-fit:contain;display:block}
.ch-logo-ph{font-size:9px;font-weight:700;color:var(--muted2);text-align:center;padding:2px}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:16px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ch-now{font-size:14px;color:var(--muted3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px;line-height:1.2}
.ch-now-title{color:var(--accent2);font-weight:500}
.ch-prog-bar{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));opacity:.45}
.epg-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.epg-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;flex-shrink:0}
.epg-ch-title{display:flex;align-items:center;gap:12px}
.epg-logo-wrap{width:54px;height:38px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.epg-logo{max-width:48px;max-height:32px;object-fit:contain}
.epg-logo-ph{font-size:10px;font-weight:700;color:var(--muted2);padding:4px}
.epg-ch-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.epg-ch-sub{font-size:11px;color:var(--muted3);margin-top:2px}
.epg-date-tabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.date-tab{background:transparent;border:1px solid var(--border2);border-radius:4px;padding:4px 10px;font-size:10px;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all .15s;white-space:nowrap}
.date-tab:hover{border-color:var(--accent2);color:var(--text)}
.date-tab.active{background:var(--accentdim);border-color:rgba(0,212,255,.4);color:var(--accent)}
.epg-list{flex:1;overflow-y:auto;padding:10px 14px}
.prog-item{display:flex;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:5px;border:1px solid transparent;transition:background .12s,border-color .12s;position:relative;overflow:hidden}
.prog-item:hover{background:var(--card);border-color:var(--border)}
.prog-item.now{background:var(--card2);border-color:rgba(0,212,255,.22)}
.prog-item.now::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:3px 0 0 3px}
.prog-item.past{opacity:.4}
.prog-time{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--muted3);width:44px;flex-shrink:0;padding-top:1px;line-height:1.5}
.prog-item.now .prog-time{color:var(--accent)}
.prog-body{flex:1;min-width:0}
.prog-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
.prog-item.now .prog-title{color:var(--accent)}
.prog-desc{font-size:11px;color:var(--muted3);margin-top:3px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prog-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.prog-tag{font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--muted3)}
.prog-tag.live{background:rgba(255,77,109,.12);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.prog-dur{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding-top:2px;flex-shrink:0}
.prog-bar-wrap{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
.skel-ch{height:52px;background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-bottom:1px solid rgba(255,255,255,.025)}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.center-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted2);padding:40px;text-align:center}
.center-msg .icon{font-size:52px;opacity:.18}
.center-msg .ttl{font-size:15px;font-weight:600;color:var(--muted3)}
.center-msg .sub{font-size:12px;line-height:1.6;max-width:280px}
.retry-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);color:var(--accent);padding:7px 16px;border-radius:5px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;transition:background .15s;margin-top:6px}
.retry-btn:hover{background:rgba(0,212,255,.2)}
</style>
</head>

// Build lookup maps from LOCAL_CHANNELS
const LOCAL_BY_LCN={};
const LOCAL_BY_ALIAS={};
for(const ch of LOCAL_CHANNELS){
  LOCAL_BY_LCN[ch.lcn]=ch;
  LOCAL_BY_ALIAS[ch.name.toLowerCase()]=ch;
  for(const a of ch.aliases) LOCAL_BY_ALIAS[a.toLowerCase()]=ch;
}

function lookupLocal(name){
  if(!name) return null;
  const k=name.toLowerCase().replace(/\s+/g,' ').trim();
  if(LOCAL_BY_ALIAS[k]) return LOCAL_BY_ALIAS[k];
  const stripped=k.replace(/\s+(hd\+1|\+1\s*hd|full\s*hd|fhd|h\.?265|uhd|4k|\+1|\+2|hd|sd|ita|italy|italia|it)\s*$/i,'').trim();
  if(stripped!==k&&LOCAL_BY_ALIAS[stripped]) return LOCAL_BY_ALIAS[stripped];
  // prefix match
  for(const [key,ch] of Object.entries(LOCAL_BY_ALIAS)){
    if(k.startsWith(key+' ')||stripped.startsWith(key+' ')) return ch;
  }
  return null;
}

function lookupLogo(name){
  const ch=lookupLocal(name);
  return ch?ch.logo:null;
}

function getLCN(name){
  if(!name) return 9999;
  const ch=lookupLocal(name);
  if(ch) return ch.lcn;
  return 9999;
}

// ═══════════════════════════════════════════════════
// DEDUPLICATION — strip quality/variant suffixes
// ═══════════════════════════════════════════════════
function canonName(raw){
  return (raw||'')
    .replace(/\s+(HD\+1|\+1\s*HD|FULL\s*HD|FHD|H\.?265|UHD|4K|HD\+|SD|HD|\+1|\+2)\s*$/i,'')
    .replace(/\s+(ITA|ITALY|ITALIA|IT)\s*$/i,'')
    .replace(/\s+FAST\+?\s*$/i,'')
    .replace(/\s*\([^)]*\)\s*$/,'')
    .replace(/\s+/g,' ').trim();
}
// Prefer: HD > plain > FHD > SD > +1
function variantScore(raw){
  const r=(raw||'').toUpperCase();
  if(/HD\+1|\+1\s*HD/.test(r)) return 10;
  if(/\+1|\+2/.test(r)) return 9;
  if(/\bSD\b/.test(r)) return 8;
  if(/H\.?265/.test(r)) return 7;
  if(/\bFULL\s*HD\b|\bFHD\b/.test(r)) return 3;
  if(/\bUHD\b|\b4K\b/.test(r)) return 4;
  if(/\bHD\b/.test(r)) return 1;
  return 5;
}

// Cache con IndexedDB (primario) + localStorage (fallback) per persistenza anche su file://
const _IDB_NAME='epgcache',_IDB_STORE='data',_IDB_VER=1;
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open(_IDB_NAME,_IDB_VER);r.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB_STORE);r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
async function saveCache(xml){
  const payload=JSON.stringify({ts:Date.now(),xml});
  // prova IndexedDB
  try{const db=await openIDB();await new Promise((res,rej)=>{const tx=db.transaction(_IDB_STORE,'readwrite');tx.objectStore(_IDB_STORE).put(payload,CACHE_KEY);tx.oncomplete=res;tx.onerror=rej;});return;}catch(e){}
  // fallback localStorage/sessionStorage
  for(const s of [localStorage,sessionStorage]){try{s.setItem(CACHE_KEY,payload);return;}catch(e){}}
}
async function loadCache(){
  // prova IndexedDB
  try{const db=await openIDB();const val=await new Promise((res,rej)=>{const tx=db.transaction(_IDB_STORE,'readonly');const req=tx.objectStore(_IDB_STORE).get(CACHE_KEY);req.onsuccess=e=>res(e.target.result);req.onerror=rej;});if(val){const c=JSON.parse(val);if(Date.now()-c.ts<CACHE_TTL)return c;}}catch(e){}
  // fallback localStorage/sessionStorage
  for(const s of [localStorage,sessionStorage]){try{const c=JSON.parse(s.getItem(CACHE_KEY)||'null');if(c&&Date.now()-c.ts<CACHE_TTL)return c;}catch(e){}}
  return null;
}
async function hardRefresh(){
  try{const db=await openIDB();db.transaction(_IDB_STORE,'readwrite').objectStore(_IDB_STORE).delete(CACHE_KEY);}catch(e){}
  try{localStorage.removeItem(CACHE_KEY);}catch(e){}
  try{sessionStorage.removeItem(CACHE_KEY);}catch(e){}
  document.getElementById('cacheBadge').style.display='none';
  init(true);
}

// ═══════════════════════════════════════════════════
// GZIP DECOMPRESSION
// ═══════════════════════════════════════════════════
async function ungzip(buf){
  try{
    const ds=new DecompressionStream('gzip');
    const w=ds.writable.getWriter(), r=ds.readable.getReader();
    w.write(new Uint8Array(buf)); w.close();
    const chunks=[]; while(true){const{done,value}=await r.read();if(done)break;chunks.push(value);}
    const total=chunks.reduce((n,c)=>n+c.length,0);
    const out=new Uint8Array(total); let off=0;
    for(const c of chunks){out.set(c,off);off+=c.length;}
    return new TextDecoder().decode(out);
  }catch(e){return null;}
}
async function extractXml(resp){
  try{
    const buf=await resp.arrayBuffer();
    const h=new Uint8Array(buf.slice(0,2));
    if(h[0]===0x1f&&h[1]===0x8b){const t=await ungzip(buf);if(t&&t.includes('<tv'))return t;}
    const t=new TextDecoder().decode(buf);
    if(t.includes('<tv'))return t;
    try{const j=JSON.parse(t);if(j&&j.contents&&j.contents.includes('<tv'))return j.contents;}catch(e){}
  }catch(e){}
  return null;
}
async function fetchEPG(url){
  const opts={signal:AbortSignal.timeout(12000)};
  // 1. Direct
  try{const r=await fetch(url,opts);if(r.ok){const t=await r.text();if(t&&t.includes('<tv'))return t;}}catch(e){}
  // 2. corsproxy
  try{const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(url),{signal:AbortSignal.timeout(16000)});if(r.ok){const x=await extractXml(r);if(x)return x;}}catch(e){}
  // 3. allorigins raw
  try{const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(16000)});if(r.ok){const x=await extractXml(r);if(x)return x;}}catch(e){}
  // 4. allorigins get
  try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(16000)});if(r.ok){const j=await r.json();if(j&&j.contents&&j.contents.includes('<tv'))return j.contents;}}catch(e){}
  // 5. codetabs
  try{const r=await fetch('https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(url),{signal:AbortSignal.timeout(16000)});if(r.ok){const x=await extractXml(r);if(x)return x;}}catch(e){}
  return null;
}

// ═══════════════════════════════════════════════════
// XMLTV PARSER WITH DEDUPLICATION
// ═══════════════════════════════════════════════════
function parseDate(s){
  const m=s.replace(/\s.*/,'');
  const iso=`${m.slice(0,4)}-${m.slice(4,6)}-${m.slice(6,8)}T${m.slice(8,10)||'00'}:${m.slice(10,12)||'00'}:${m.slice(12,14)||'00'}`;
  const tz=s.slice(m.length).trim();
  if(tz) return new Date(iso+(tz[0]==='+'||tz[0]==='-'?tz[0]+tz.slice(1,3)+':'+tz.slice(3,5)||'00':'+00:00'));
  return new Date(iso+'Z');
}

function parseXMLTV(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  if(doc.querySelector('parsererror')) throw new Error('XML parse error');

  // Pass 1: collect raw channels
  const raw=[];
  doc.querySelectorAll('channel').forEach(el=>{
    const id=el.getAttribute('id');
    const d=el.querySelector('display-name');
    const ic=el.querySelector('icon');
    if(!id||!d) return;
    raw.push({id,rawName:d.textContent.trim(),logo:(ic?ic.getAttribute('src'):'')||''});
  });

  // Pass 2: deduplicate — group by canonical name, keep best variant
  const canonMap={};   // canon → {id, rawName, logo, score, allIds[]}
  const idToCanon={};  // any id → canon key

  for(const ch of raw){
    const canon=canonName(ch.rawName);
    const score=variantScore(ch.rawName);
    if(!canonMap[canon]){
      canonMap[canon]={id:ch.id,rawName:ch.rawName,logo:ch.logo,score,allIds:[ch.id]};
    } else {
      canonMap[canon].allIds.push(ch.id);
      if(score<canonMap[canon].score){
        canonMap[canon].id=ch.id;
        canonMap[canon].rawName=ch.rawName;
        canonMap[canon].logo=ch.logo;
        canonMap[canon].score=score;
      }
    }
  }
  for(const [canon,entry] of Object.entries(canonMap)){
    for(const id of entry.allIds) idToCanon[id]=canon;
  }

  // Pass 3: programmes — merge all variants
  const progMap={};  // canon → Map<timeKey, prog>
  doc.querySelectorAll('programme').forEach(el=>{
    const chId=el.getAttribute('channel');
    const startRaw=el.getAttribute('start');
    if(!chId||!startRaw) return;
    const canon=idToCanon[chId];
    if(!canon) return;
    let start,stop;
    try{start=parseDate(startRaw);}catch(e){return;}
    try{stop=el.getAttribute('stop')?parseDate(el.getAttribute('stop')):null;}catch(e){stop=null;}
    const title=(el.querySelector('title')||{}).textContent?.trim()||'—';
    const desc=(el.querySelector('desc')||{}).textContent?.trim()||'';
    const cat=(el.querySelector('category')||{}).textContent?.trim()||'';
    const tk=start.getTime().toString();
    if(!progMap[canon]) progMap[canon]=new Map();
    if(!progMap[canon].has(tk)) progMap[canon].set(tk,{start,stop,title,desc,category:cat});
  });

  // Pass 4: build channel list, then deduplicate by final display name
  // (EPG may have Rai1.it / Rai1.sky.it / Rai1.tivusat.it → all become "Rai 1")
  const rawList=Object.entries(canonMap).map(([canon,entry])=>{
    const local=lookupLocal(canon);
    return {
      id:canon,
      name:local?local.name:canon,
      logo:local?local.logo:(entry.logo||''),
      lcn:local?local.lcn:getLCN(canon),
    };
  });

  // Merge by final name: keep entry with best (lowest) lcn, merge programme IDs
  const nameMap={};   // final name (lower) → best entry
  const nameToCanons={}; // final name (lower) → [canon ids]
  for(const ch of rawList){
    const k=ch.name.toLowerCase();
    if(!nameMap[k]){
      nameMap[k]=ch;
      nameToCanons[k]=[ch.id];
    } else {
      nameToCanons[k].push(ch.id);
      // keep lower lcn
      if(ch.lcn<nameMap[k].lcn) nameMap[k]={...ch};
    }
  }

  // Re-map programme IDs to the winning canon for each merged group
  for(const [nameKey,canons] of Object.entries(nameToCanons)){
    if(canons.length<=1) continue;
    const winId=nameMap[nameKey].id;
    if(!progMap[winId]) progMap[winId]=new Map();
    for(const cid of canons){
      if(cid===winId) continue;
      if(progMap[cid]) for(const [tk,p] of progMap[cid]) if(!progMap[winId].has(tk)) progMap[winId].set(tk,p);
    }
  }

  const programmes={};
  for(const [nameKey,ch] of Object.entries(nameMap)){
    const map=progMap[ch.id];
    if(map){
      // Dedup definitivo: stessa chiave = arrotonda start al minuto + titolo normalizzato
      const seen=new Set();
      const deduped=[];
      for(const p of [...map.values()].sort((a,b)=>a.start-b.start)){
        const roundedMin=Math.round(p.start.getTime()/60000);
        const k=roundedMin+'|'+p.title.toLowerCase().replace(/\s+/g,' ').trim();
        if(!seen.has(k)){seen.add(k);deduped.push(p);}
      }
      programmes[ch.id]=deduped;
    }
  }

  const chList=Object.values(nameMap);
  return{channels:chList,programmes};
}

function getGroup(name){
  const n=name.toLowerCase();
  for(const{g,kw}of GROUP_RULES){if(kw.some(k=>n.includes(k)))return g;}
  return 'Altro';
}

// ═══════════════════════════════════════════════════
// UTILITY: get current program (the one started most recently among overlapping)
// ═══════════════════════════════════════════════════
function getCurrentProgram(programs, now) {
  if (!programs || programs.length === 0) return null;
  const overlapping = programs.filter(p => p.start <= now && p.stop && p.stop > now);
  if (overlapping.length === 0) return null;
  // choose the one with the latest start (most recent started)
  return overlapping.reduce((latest, p) => p.start > latest.start ? p : latest, overlapping[0]);
}

// RENDER CHANNELS
// ═══════════════════════════════════════════════════
function renderChannels(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const list=document.getElementById('chList');
  list.innerHTML='';
  const now=new Date();
  let shown=0;
  for(const ch of channels){
    if(ch.lcn>=9999) continue; // nasconde canali senza numero
    if(filterGroup!=='all'&&getGroup(ch.name)!==filterGroup) continue;
    if(q&&!ch.name.toLowerCase().includes(q)) continue;
    shown++;
    const progs=programmes[ch.id]||[];
    const current = getCurrentProgram(progs, now);
    const nowP = current || progs.find(p => p.start > now);
    let pct=0;
    if(current && current.stop && current.start<=now && current.stop>now)
      pct=Math.min(100,((now-current.start)/(current.stop-current.start))*100);
    const ini=ch.name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'TV';
    const item=document.createElement('div');
    item.className='ch-item'+(activeChannel&&activeChannel.id===ch.id?' active':'');
    item.innerHTML=`
      <div class="ch-num">${ch.lcn<9999?ch.lcn:''}</div>
      <div class="ch-logo-wrap">
        ${ch.logo
          ?`<img class="ch-logo" src="${esc(ch.logo)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='block'"><div class="ch-logo-ph" style="display:none">${ini}</div>`
          :`<div class="ch-logo-ph">${ini}</div>`}
      </div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-now">${nowP?`<span class="ch-now-title">${esc(nowP.title)}</span>`:'<span>—</span>'}</div>
      </div>
      ${pct>0?`<div class="ch-prog-bar" style="width:${pct.toFixed(1)}%"></div>`:''}`;
    item.addEventListener('click',()=>selectChannel(ch,item));
    list.appendChild(item);
  }
  if(!shown) list.innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted2);font-size:12px">Nessun canale trovato</div>`;
}

// DATES

function buildDates(progs){const s=new Set();for(const p of progs)s.add(ldk(p.start));return[...s].sort();}
function ldk(d){return d.toLocaleDateString('sv-SE');}
function todayKey(){return new Date().toLocaleDateString('sv-SE');}
function fmtDate(key){
  const[y,m,d]=key.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const td=new Date();td.setHours(0,0,0,0);
  const diff=Math.round((dt-td)/86400000);
  const nm={'-1':'Ieri','0':'Oggi','1':'Domani'};
  if(nm[diff]!==undefined)return nm[diff];
  return dt.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});
}
function renderDateTabs(){
  const el=document.getElementById('dateTabs');el.innerHTML='';
  if(!allDates.length){el.innerHTML='<span style="font-size:10px;color:var(--muted2)">Nessuna data</span>';return;}
  for(const d of allDates){
    const btn=document.createElement('button');
    btn.className='date-tab'+(d===activeDate?' active':'');
    btn.textContent=fmtDate(d);
    btn.onclick=()=>{activeDate=d;renderDateTabs();renderSchedule();};
    el.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════
// RENDER SCHEDULE
// ═══════════════════════════════════════════════════
function renderSchedule(){
  const el=document.getElementById('epgList');
  if(!activeChannel){el.innerHTML='';return;}
  const now=new Date();
  const progs=(programmes[activeChannel.id]||[]).filter(p=>ldk(p.start)===activeDate);
  document.getElementById('epgChSub').textContent=`${progs.length} programmi · ${fmtDate(activeDate)}`;
  if(!progs.length){
    el.innerHTML=`<div class="center-msg"><div class="icon">📋</div><div class="sub">Nessun programma per questa data</div></div>`;
    return;
  }
  // determina il programma corrente (se presente) usando la funzione helper
  const currentProgram = getCurrentProgram(progs, now);
  el.innerHTML='';let scrollTo=null;
  for(const p of progs){
    const isNow = (currentProgram === p);
    const isPast = p.stop && p.stop <= now;
    const item=document.createElement('div');
    item.className='prog-item'+(isNow?' now':'')+(isPast?' past':'');
    const ss=p.start.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    const es=p.stop?p.stop.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'';
    const dur=p.stop?Math.round((p.stop-p.start)/60000):0;
    let pct=0;if(isNow&&p.stop)pct=Math.min(100,((now-p.start)/(p.stop-p.start))*100);
    item.innerHTML=`
      <div class="prog-time">${ss}${es?`<br><span style="font-size:9px;opacity:.4">${es}</span>`:''}</div>
      <div class="prog-body">
        <div class="prog-title">${esc(p.title)}</div>
        ${p.desc?`<div class="prog-desc">${esc(p.desc)}</div>`:''}
        <div class="prog-meta">
          ${isNow?'<span class="prog-tag live">● IN ONDA</span>':''}
          ${p.category?`<span class="prog-tag">${esc(p.category)}</span>`:''}
        </div>
        ${isNow&&pct>0?`<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>`:''}
      </div>
      ${dur>0?`<div class="prog-dur">${dur}m</div>`:''}`;
    el.appendChild(item);
    if(isNow)scrollTo=item;
  }
  if(scrollTo)setTimeout(()=>scrollTo.scrollIntoView({behavior:'smooth',block:'center'}),80);
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showSkeleton(){const el=document.getElementById('chList');el.innerHTML='';for(let i=0;i<22;i++){const d=document.createElement('div');d.className='skel-ch';el.appendChild(d);}}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function showLocalChannels(){
  // Mostra subito tutti i canali LOCAL_CHANNELS mentre EPG carica
  channels=LOCAL_CHANNELS.map(lc=>({id:'local_'+lc.lcn,name:lc.name,logo:lc.logo,lcn:lc.lcn}));
  channels.sort((a,b)=>a.lcn-b.lcn);
  programmes={};
  renderChannels();
}

function mergeEPGIntoChannels(parsed){
  // Aggiorna i canali esistenti con dati EPG, aggiunge nuovi se non presenti
  const existingNames=new Set(parsed.channels.map(c=>c.name.toLowerCase()));
  for(const lc of LOCAL_CHANNELS){
    if(!existingNames.has(lc.name.toLowerCase())){
      parsed.channels.push({id:'local_'+lc.lcn,name:lc.name,logo:lc.logo,lcn:lc.lcn});
    }
  }
  parsed.channels.sort((a,b)=>{
    if(a.lcn<9999&&b.lcn<9999)return a.lcn-b.lcn;
    if(a.lcn<9999)return-1;if(b.lcn<9999)return 1;
    return a.name.localeCompare(b.name,'it');
  });
  channels=parsed.channels;
  programmes=parsed.programmes;
}

async function init(forceRefresh=false){
  setStatus('loading','Caricamento...');
  // Mostra subito i canali locali senza aspettare EPG
  showLocalChannels();
  const EPG_URL='https://www.epgitalia.tv/gzip';
  let xmlText=null;
  if(!forceRefresh){
    const cached=await loadCache();
    if(cached&&cached.xml){xmlText=cached.xml;setStatus('loading','Da cache...');}
  }
  if(!xmlText){
    setStatus('loading','Download EPG...');
    xmlText=await fetchEPG(EPG_URL);
    if(xmlText)await saveCache(xmlText);
  }
  if(!xmlText||!xmlText.includes('<tv')){
    setStatus('err','Errore connessione — solo canali locali');
    return; // canali locali già visibili
  }
  setStatus('loading','Elaborazione...');
  await new Promise(r=>setTimeout(r,10));
  let parsed;
  try{parsed=parseXMLTV(xmlText);}
  catch(e){
    setStatus('err','Errore parsing XML');
    return; // canali locali già visibili
  }
  mergeEPGIntoChannels(parsed);
  setStatus('ok',`${channels.length} canali`);
  buildFilters();
  renderChannels();
  // Refresh in onda ogni minuto
  setTimeout(function refresh(){
    if(channels.length){renderChannels();}
    if(activeChannel)renderSchedule();
    setTimeout(refresh,60000);
  },60000);
}
init();
</script>
