<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPG Italia — Guida Programmi TV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap');
:root{
  --bg:#08080e;--surface:#0f0f1a;--card:#141420;--border:#1e1e30;--border2:#2a2a40;
  --accent:#2979ff;--accent2:#82b1ff;--text:#e2e2ee;--muted:#44445a;--muted2:#6a6a85;
  --gold:#ffd740;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;padding:0 0 40px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:2px}
.logo span{color:var(--accent)}
.status{padding:4px 12px;background:var(--card);border-radius:30px;font-size:12px;color:var(--muted2);margin-left:auto}
.search-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px}
#search{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border2);border-radius:30px;padding:8px 16px;color:var(--text);font-size:14px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted2)}
.container{padding:20px;max-width:1400px;margin:0 auto}
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.channel-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s}
.channel-card:hover{background:var(--surface);border-color:var(--accent2)}
.card-header{display:flex;flex-direction:column;gap:6px;padding:12px;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer}
.channel-name{font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.current-program{font-size:12px;color:var(--accent2);margin-top:4px}
.program-details{padding:12px;border-top:1px solid var(--border);display:none}
.program-details.open{display:block}
.program-list{max-height:450px;overflow-y:auto}
.program-item{padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.program-time{font-weight:600;color:var(--gold);margin-right:12px;font-family:monospace;display:inline-block;width:70px}
.program-title{font-weight:500}
.program-desc{font-size:12px;color:var(--muted2);margin-top:4px;line-height:1.4;margin-left:70px}
.loading,.error{text-align:center;padding:60px;color:var(--muted2)}
.error button{background:var(--card);border:1px solid var(--border);padding:8px 20px;border-radius:30px;color:var(--text);margin-top:20px;cursor:pointer}
.loader{border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
<header>
  <div class="logo"><span>EPG</span> Italia</div>
  <div class="status" id="status">Caricamento...</div>
</header>
<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Cerca canale..." oninput="filterChannels()">
</div>
<div class="container" id="container">
  <div class="loading"><div class="loader"></div><p>Caricamento guida programmi...</p></div>
</div>

<script>
let epgData = null;
let channelsList = [];
let filteredChannels = [];

async function fetchEPGWithProxy(url) {
  // Tentativo con corsproxy.io (funziona bene per binari)
  const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
  const response = await fetch(proxy);
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const blob = await response.blob();
  const arrayBuffer = await blob.arrayBuffer();
  // Se il content-type è text/plain o application/octet-stream, potremmo ricevere testo
  const contentType = response.headers.get("content-type") || "";
  if (contentType.includes("text") || contentType.includes("xml")) {
    const text = await blob.text();
    // Se il testo inizia con <?xml o #EXTM3U o è XML, proviamo a usarlo direttamente
    if (text.trim().startsWith("<?xml") || text.trim().startsWith("<tv")) {
      return text;
    }
    // altrimenti potrebbe essere base64?
    try {
      const decoded = atob(text);
      return decoded;
    } catch(e) {
      return text;
    }
  }
  // Altrimenti trattiamo come gzip binario
  const bytes = new Uint8Array(arrayBuffer);
  // Verifica se inizia con 0x1F 0x8B (gzip magic)
  if (bytes.length >= 2 && bytes[0] === 0x1F && bytes[1] === 0x8B) {
    const decompressed = pako.inflate(bytes, { to: "string" });
    return decompressed;
  }
  // Se non è gzip, prova a interpretare come UTF-8
  return new TextDecoder("utf-8").decode(bytes);
}

async function fetchAndParseEPG() {
  const statusDiv = document.getElementById("status");
  statusDiv.textContent = "Scarico EPG...";
  try {
    const epgUrl = "https://www.epgitalia.tv/gzip";
    let xmlText = null;
    // Tentativo con corsproxy.io
    try {
      xmlText = await fetchEPGWithProxy(epgUrl);
      console.log("Downloaded via corsproxy.io, length:", xmlText.length);
    } catch (err) {
      console.warn("corsproxy.io failed:", err);
      // Fallback con allorigins
      const proxy2 = "https://api.allorigins.win/get?url=" + encodeURIComponent(epgUrl);
      const resp = await fetch(proxy2);
      if (!resp.ok) throw new Error("Allorigins HTTP " + resp.status);
      const json = await resp.json();
      const content = json.contents;
      if (!content) throw new Error("No content from allorigins");
      // Potrebbe essere base64 o già testo
      if (content.trim().startsWith("<?xml") || content.trim().startsWith("<tv")) {
        xmlText = content;
      } else {
        try {
          const decoded = atob(content);
          xmlText = decoded;
        } catch(e) {
          xmlText = content;
        }
      }
    }
    // Verifica che sia XML
    if (!xmlText || (!xmlText.includes("<?xml") && !xmlText.includes("<tv"))) {
      throw new Error("Il contenuto non sembra XML valido");
    }
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
    const parseError = xmlDoc.querySelector("parsererror");
    if (parseError) throw new Error("Errore parsing XML");
    const programmes = xmlDoc.querySelectorAll("programme");
    const channelMap = new Map();
    for (let prog of programmes) {
      let channelId = prog.getAttribute("channel");
      if (!channelId) continue;
      let displayName = channelId;
      const displayNameElem = prog.querySelector("display-name");
      if (displayNameElem && displayNameElem.textContent.trim()) displayName = displayNameElem.textContent.trim();
      const start = prog.getAttribute("start");
      const stop = prog.getAttribute("stop");
      const titleElem = prog.querySelector("title");
      const descElem = prog.querySelector("desc");
      const title = titleElem ? titleElem.textContent.trim() : "";
      const desc = descElem ? descElem.textContent.trim() : "";
      if (!title) continue;
      const key = normalizeKey(channelId);
      if (!channelMap.has(key)) {
        channelMap.set(key, { name: displayName, programs: [] });
      }
      channelMap.get(key).programs.push({ start, stop, title, desc });
    }
    // Ordina programmi per start
    for (let [_, ch] of channelMap.entries()) {
      ch.programs.sort((a,b) => (a.start || "").localeCompare(b.start || ""));
    }
    statusDiv.textContent = `Pronto (${channelMap.size} canali)`;
    return { channelMap };
  } catch (err) {
    console.error("Errore EPG:", err);
    statusDiv.textContent = "Errore caricamento";
    throw err;
  }
}

function normalizeKey(str) {
  return str.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
}

function formatTime(startStr) {
  if (!startStr) return "";
  const year = startStr.slice(0,4);
  const month = startStr.slice(4,6);
  const day = startStr.slice(6,8);
  const hour = startStr.slice(8,10);
  const minute = startStr.slice(10,12);
  return `${day}/${month} ${hour}:${minute}`;
}

function getCurrentProgram(programs) {
  const now = new Date();
  const nowStr = now.toISOString().replace(/[-:]/g, "").slice(0,14);
  for (let i = 0; i < programs.length; i++) {
    const p = programs[i];
    if (p.start <= nowStr && nowStr < p.stop) return p;
  }
  return null;
}

function getNextProgram(programs, current) {
  if (!current) return programs[0] || null;
  const idx = programs.indexOf(current);
  return programs[idx+1] || null;
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderChannels(channels) {
  const container = document.getElementById("container");
  if (!channels.length) {
    container.innerHTML = '<div class="error">Nessun canale trovato</div>';
    return;
  }
  const grid = document.createElement("div");
  grid.className = "channel-grid";
  for (let ch of channels) {
    const current = getCurrentProgram(ch.programs);
    const next = getNextProgram(ch.programs, current);
    const card = document.createElement("div");
    card.className = "channel-card";
    const header = document.createElement("div");
    header.className = "card-header";
    const nameDiv = document.createElement("div");
    nameDiv.className = "channel-name";
    nameDiv.innerHTML = `<span>${escapeHtml(ch.name)}</span><span style="font-size:12px; color:var(--accent2);">📅</span>`;
    const currentDiv = document.createElement("div");
    currentDiv.className = "current-program";
    if (current) {
      currentDiv.innerHTML = `<span style="color:var(--gold)">▶ in onda:</span> ${escapeHtml(current.title)} (${formatTime(current.start)})`;
    } else if (ch.programs.length) {
      currentDiv.innerHTML = `<span style="color:var(--muted2)">Prossimo:</span> ${escapeHtml(ch.programs[0].title)} (${formatTime(ch.programs[0].start)})`;
    } else {
      currentDiv.innerHTML = "Nessun programma disponibile";
    }
    header.appendChild(nameDiv);
    header.appendChild(currentDiv);
    const details = document.createElement("div");
    details.className = "program-details";
    const listDiv = document.createElement("div");
    listDiv.className = "program-list";
    for (let prog of ch.programs) {
      const item = document.createElement("div");
      item.className = "program-item";
      item.innerHTML = `
        <div><span class="program-time">${formatTime(prog.start)}</span> <span class="program-title">${escapeHtml(prog.title)}</span></div>
        ${prog.desc ? `<div class="program-desc">${escapeHtml(prog.desc)}</div>` : ''}
      `;
      listDiv.appendChild(item);
    }
    details.appendChild(listDiv);
    card.appendChild(header);
    card.appendChild(details);
    header.addEventListener("click", () => {
      details.classList.toggle("open");
    });
    grid.appendChild(card);
  }
  container.innerHTML = "";
  container.appendChild(grid);
}

function filterChannels() {
  const query = document.getElementById("search").value.toLowerCase().trim();
  if (!query) {
    filteredChannels = [...channelsList];
  } else {
    filteredChannels = channelsList.filter(ch => ch.name.toLowerCase().includes(query));
  }
  renderChannels(filteredChannels);
}

async function init() {
  const container = document.getElementById("container");
  container.innerHTML = '<div class="loading"><div class="loader"></div><p>Caricamento guida programmi...</p></div>';
  try {
    const epg = await fetchAndParseEPG();
    const list = [];
    for (let [key, ch] of epg.channelMap.entries()) {
      if (ch.programs.length === 0) continue;
      list.push({ key, name: ch.name, programs: ch.programs });
    }
    list.sort((a,b) => a.name.localeCompare(b.name, 'it'));
    channelsList = list;
    filteredChannels = [...channelsList];
    renderChannels(filteredChannels);
  } catch (err) {
    container.innerHTML = `<div class="error">
      <p>❌ Impossibile caricare la guida programmi.<br>Dettaglio: ${err.message}</p>
      <button onclick="init()">⟳ Riprova</button>
    </div>`;
  }
}

init();
</script>
</body>
</html>
