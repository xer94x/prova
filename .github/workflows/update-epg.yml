name: Aggiorna EPG

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scarica EPG e salva compresso
        run: |
          curl -L --max-time 60 \
            "https://www.epgitalia.tv/gzip" \
            -o epg-it.xml.gz || true

          # Verifica che sia un gzip valido con XML dentro
          if gunzip -c epg-it.xml.gz 2>/dev/null | grep -q '<tv'; then
            echo "OK — $(wc -c < epg-it.xml.gz) bytes compressi"
          else
            echo "Fonte principale fallita, provo iptv-epg.org..."
            curl -L --max-time 60 \
              "https://iptv-epg.org/files/epg-it.xml" \
              -o epg-raw || true
            if file epg-raw | grep -q 'gzip'; then
              mv epg-raw epg-it.xml.gz
            else
              gzip -c epg-raw > epg-it.xml.gz
            fi
            rm -f epg-raw
          fi

          if gunzip -c epg-it.xml.gz 2>/dev/null | grep -q '<tv'; then
            echo "EPG OK — $(wc -c < epg-it.xml.gz) bytes compressi"
          else
            echo "ERRORE: nessuna fonte valida"
            exit 1
          fi

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg-it.xml.gz
          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "EPG aggiornato $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
